  <title>Python Mastery — آموزش عمیق و تمیز پایتون</title>
  <style>
    :root{
      --bg:#f6f7fb; --surface:#ffffff; --surface2:#f1f5f9; --text:#111827; --muted:#64748b; --line:#e5e7eb;
      --brand:#2563eb; --brand2:#1d4ed8; --ok:#15803d; --warn:#b45309; --bad:#b91c1c;
      --okbg:#ecfdf5; --warnbg:#fffbeb; --badbg:#fef2f2; --code:#0f172a; --codetext:#dbeafe;
      --shadow:0 18px 50px rgba(15,23,42,.07); --radius:18px;
      --sans:Inter,system-ui,-apple-system,"Segoe UI",Tahoma,Arial,sans-serif; --mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    }
    [data-theme="dark"]{--bg:#0b1120;--surface:#111827;--surface2:#172033;--text:#f8fafc;--muted:#94a3b8;--line:#263247;--brand:#60a5fa;--brand2:#3b82f6;--code:#050816;--codetext:#dbeafe;--shadow:0 20px 60px rgba(0,0,0,.28);--okbg:rgba(21,128,61,.16);--warnbg:rgba(180,83,9,.16);--badbg:rgba(185,28,28,.16)}
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.75} button,textarea,input{font:inherit} button{cursor:pointer;color:inherit}
    .app{max-width:1180px;margin:0 auto;padding:16px}.top{position:sticky;top:0;z-index:30;background:color-mix(in srgb,var(--bg) 92%,transparent);backdrop-filter:blur(16px);border-bottom:1px solid var(--line);margin:-16px -16px 18px;padding:14px 16px}.topin{max-width:1180px;margin:auto;display:flex;align-items:center;justify-content:space-between;gap:14px}.brand{display:flex;align-items:center;gap:12px;min-width:0}.logo{width:42px;height:42px;border-radius:14px;background:var(--text);color:var(--bg);display:grid;place-items:center;font-weight:900;letter-spacing:-.05em}.brand h1{font-size:16px;margin:0;letter-spacing:-.02em}.brand p{font-size:12px;color:var(--muted);margin:1px 0 0}.nav{display:flex;gap:7px;overflow:auto;scrollbar-width:none}.nav button,.icon{border:1px solid var(--line);background:var(--surface);border-radius:999px;padding:9px 12px;color:var(--muted);white-space:nowrap}.nav button.active{background:var(--text);color:var(--bg);font-weight:800;border-color:var(--text)}.icon{width:40px;height:40px;border-radius:13px;display:grid;place-items:center;padding:0}
    .layout{display:grid;grid-template-columns:300px minmax(0,1fr);gap:16px;align-items:start}.panel,.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}.pad{padding:18px}.side{position:sticky;top:86px}.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat{border:1px solid var(--line);background:var(--surface2);border-radius:15px;padding:12px}.stat small{display:block;font-size:12px;color:var(--muted)}.stat b{display:block;font-size:21px;margin-top:3px;letter-spacing:-.03em}.progress{height:9px;border-radius:999px;background:var(--surface2);overflow:hidden;border:1px solid var(--line)}.progress i{display:block;height:100%;background:var(--brand);width:0;transition:.25s}.small{font-size:12px;color:var(--muted)}.muted{color:var(--muted)}
    .section-title{display:flex;align-items:end;justify-content:space-between;gap:12px;margin:0 0 14px}.section-title h2{font-size:25px;margin:0;letter-spacing:-.035em}.section-title p{margin:3px 0 0;color:var(--muted);font-size:14px}.hero{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(280px,.8fr);gap:14px}.hero h2{font-size:clamp(31px,5vw,52px);line-height:1.12;margin:0 0 13px;letter-spacing:-.06em}.hero p{color:var(--muted);margin:0 0 18px}.tag{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:var(--surface2);border-radius:999px;padding:5px 9px;font-size:12px;color:var(--muted)}
    .btnrow{display:flex;gap:9px;flex-wrap:wrap}.btn{border:1px solid var(--line);background:var(--surface);border-radius:13px;padding:10px 13px;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.15s}.btn:hover{transform:translateY(-1px)}.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff;font-weight:800}.btn.dark{background:var(--text);border-color:var(--text);color:var(--bg);font-weight:800}.btn.ok{background:var(--ok);border-color:var(--ok);color:#fff}.btn.warn{background:var(--warn);border-color:var(--warn);color:#fff}.btn:disabled{opacity:.55;cursor:not-allowed;transform:none}.full{width:100%}
    .lesson-list{display:grid;gap:10px}.lesson-row{width:100%;border:1px solid var(--line);background:var(--surface);border-radius:15px;padding:12px;text-align:inherit;display:grid;grid-template-columns:38px minmax(0,1fr) auto;gap:10px;align-items:center}.lesson-row:hover{border-color:var(--brand)}.lesson-row.active{outline:2px solid color-mix(in srgb,var(--brand) 28%,transparent);border-color:var(--brand)}.lesson-row.locked{opacity:.5}.num{width:34px;height:34px;border-radius:12px;background:var(--surface2);display:grid;place-items:center;font-weight:900}.lesson-row h3{font-size:14px;margin:0}.lesson-row p{font-size:12px;margin:2px 0 0;color:var(--muted)}.stars{color:#d97706;font-size:12px;letter-spacing:1px}
    .learn-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(360px,.92fr);gap:16px}.lesson-head h2{font-size:28px;margin:0 0 8px;letter-spacing:-.04em}.meta{display:flex;gap:6px;flex-wrap:wrap}.stepper{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0}.step{border:1px solid var(--line);background:var(--surface2);border-radius:14px;padding:9px;color:var(--muted);font-size:12px}.step b{display:block;color:var(--text);font-size:12px}.step.done{background:var(--okbg);border-color:color-mix(in srgb,var(--ok) 40%,var(--line));color:var(--ok)}.step.active{background:color-mix(in srgb,var(--brand) 10%,var(--surface));border-color:var(--brand)}
    .article{display:grid;gap:14px}.article h3{font-size:18px;margin:0}.article p{margin:0;color:var(--text)}.article .box{border:1px solid var(--line);background:var(--surface2);border-radius:15px;padding:14px}.bullets{margin:0;padding:0;list-style:none;display:grid;gap:8px}.bullets li{border:1px solid var(--line);background:var(--surface2);border-radius:13px;padding:10px 12px}.code,pre{direction:ltr;text-align:left;background:var(--code);color:var(--codetext);border-radius:15px;border:1px solid color-mix(in srgb,var(--line) 50%,#000);padding:14px;overflow:auto;font-family:var(--mono);font-size:13px;line-height:1.65}pre{margin:0}.example{border:1px solid var(--line);background:var(--surface);border-radius:16px;padding:14px}.example h4{margin:0 0 8px;font-size:15px}.example p{color:var(--muted);font-size:14px;margin:8px 0 0}.outlabel{font-size:12px;color:var(--muted);margin:8px 0 5px}
    .tabs{display:flex;gap:8px;overflow:auto;padding-bottom:6px}.tab{border:1px solid var(--line);background:var(--surface);border-radius:999px;padding:8px 11px;color:var(--muted);white-space:nowrap}.tab.active{background:var(--text);color:var(--bg);border-color:var(--text);font-weight:800}.exercise-card{border:1px solid var(--line);background:var(--surface2);border-radius:16px;padding:14px;margin:10px 0}.exercise-card h3{margin:0 0 5px}.checklist{display:grid;gap:7px;margin-top:10px}.checklist div{border:1px solid var(--line);background:var(--surface);border-radius:12px;padding:8px 10px;color:var(--muted);font-size:13px}.editor{width:100%;min-height:260px;resize:vertical;direction:ltr;text-align:left;background:var(--code);color:var(--codetext);border:1px solid color-mix(in srgb,var(--line) 50%,#000);border-radius:15px;padding:14px;font-family:var(--mono);font-size:13px;line-height:1.65;outline:none}.editor:focus{border-color:var(--brand);box-shadow:0 0 0 3px color-mix(in srgb,var(--brand) 18%,transparent)}.editor::placeholder{color:#94a3b8}.output{min-height:115px;white-space:pre-wrap}.notice{border:1px solid var(--line);background:var(--surface2);border-radius:15px;padding:12px;color:var(--muted);margin:10px 0}.notice.ok{background:var(--okbg);border-color:color-mix(in srgb,var(--ok) 38%,var(--line));color:var(--ok)}.notice.warn{background:var(--warnbg);border-color:color-mix(in srgb,var(--warn) 38%,var(--line));color:var(--warn)}.notice.bad{background:var(--badbg);border-color:color-mix(in srgb,var(--bad) 38%,var(--line));color:var(--bad)}.choice{width:100%;text-align:inherit;border:1px solid var(--line);background:var(--surface);border-radius:14px;padding:12px;margin:8px 0}.choice.correct{background:var(--okbg);border-color:var(--ok);color:var(--ok)}.choice.wrong{background:var(--badbg);border-color:var(--bad);color:var(--bad)}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.card{padding:16px}.card h3{margin:0 0 8px}.card p{color:var(--muted);margin:0 0 12px}.flash{min-height:130px;display:grid;place-items:center;text-align:center}.flash b{font-size:24px}.empty{text-align:center;padding:34px;color:var(--muted)}.toast{position:fixed;left:18px;right:18px;bottom:18px;max-width:520px;margin:auto;background:var(--text);color:var(--bg);border-radius:15px;padding:12px 14px;box-shadow:var(--shadow);z-index:60;display:none}.toast.show{display:block}.kbd{font-family:var(--mono);direction:ltr;background:var(--surface2);border:1px solid var(--line);border-radius:7px;padding:1px 5px;color:var(--muted);font-size:12px}
    @media(max-width:980px){.layout{grid-template-columns:1fr}.side{position:static}.learn-grid,.hero{grid-template-columns:1fr}.topin{align-items:start}.brand p{display:none}.grid3{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}.app{padding:12px}.top{margin:-12px -12px 14px;padding:12px}.nav{max-width:100%}}
    @media(max-width:620px){.topin{display:grid;grid-template-columns:1fr auto}.nav{grid-column:1/-1}.stats{grid-template-columns:repeat(4,1fr)}.stat{padding:9px}.stat b{font-size:16px}.stat small{font-size:10px}.stepper{grid-template-columns:1fr 1fr}.hero h2{font-size:31px}.lesson-row{grid-template-columns:34px 1fr}.stars{grid-column:2}.learn-grid{gap:12px}.pad{padding:14px}}
  </style>

<body>
  <div id="app" class="app"></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
<script>
const LESSONS = [{"id":"print-comments","title":"۱. اولین خروجی: print و کامنت","chapter":"شروع واقعی","difficulty":"مبتدی","time":"۲۰ تا ۳۰ دقیقه","skill":"print، ترتیب اجرا، comment","summary":"در این درس یاد می‌گیری چطور با Python حرف بزنی، خروجی بسازی، و کدت را قابل فهم نگه داری.","bigIdea":"برنامه‌نویسی یعنی دادن دستورهای دقیق به کامپیوتر. اولین دستور مفید در پایتون print است؛ با آن می‌توانی نتیجه فکر خودت را روی صفحه ببینی.","explanation":["وقتی یک برنامه را اجرا می‌کنی، Python خط‌ها را معمولاً از بالا به پایین می‌خواند. هر خط مثل یک دستور کوچک است. اگر چند دستور print پشت سر هم بنویسی، خروجی هم به همان ترتیب نمایش داده می‌شود. این نکته ساده، پایه فهم تمام برنامه‌های بزرگ‌تر است.","دستور print برای نمایش متن، عدد یا نتیجه محاسبه استفاده می‌شود. متن باید داخل علامت نقل‌قول باشد؛ مثل \"سلام\" یا 'Python'. عددها معمولاً بدون نقل‌قول نوشته می‌شوند. اگر عدد را داخل نقل‌قول بگذاری، Python آن را به چشم متن می‌بیند، نه عدد قابل محاسبه.","کامنت با علامت # شروع می‌شود. Python کامنت را اجرا نمی‌کند. کامنت برای خودت و بقیه برنامه‌نویس‌هاست تا بعداً بفهمید هر بخش کد چه کاری انجام می‌دهد. کامنت خوب توضیح واضحات نیست؛ دلیل یا هدف کد را روشن می‌کند.","در شروع یادگیری، خروجی گرفتن بسیار مهم است، چون به تو نشان می‌دهد کامپیوتر دقیقاً چه چیزی از دستورهای تو فهمیده است. هر بار که کد می‌نویسی، از خودت بپرس: انتظار دارم خروجی چه باشد؟ سپس اجرا کن و مقایسه کن."],"mentalModel":"Python مثل یک دستیار دقیق است؛ هر خط را می‌خواند و همان کاری را انجام می‌دهد که واضح نوشته‌ای، نه چیزی که در ذهنت بوده است.","syntax":["print(\"متن\")","print(12)","# این خط فقط توضیح است"],"commonMistakes":["فراموش کردن پرانتز در print","فراموش کردن نقل‌قول دور متن","انتظار داشتن از کامنت که اجرا شود","نوشتن چند دستور در یک خط بدون دلیل"],"examples":[{"title":"نمایش یک پیام ساده","code":"print(\"سلام برنامه‌نویس!\")","output":"سلام برنامه‌نویس!","explain":"متن داخل نقل‌قول دقیقاً در خروجی چاپ می‌شود."},{"title":"چند خط خروجی","code":"print(\"شروع\")\nprint(\"در حال یادگیری پایتون\")\nprint(\"پایان\")","output const STORAGE_KEY = "python-mastery-rich-v1";
const defaultState = {view:"home", selectedLesson:0, selectedExercise:{}, step:{}, completed:{}, completedExercises:{}, code:{}, predict:{}, hints:{}, attempts:{}, weak:{}, xp:0, streak:0, lastStudy:"", theme:"light", runs:0};
let state = loadState();
function loadState(){try{return {...defaultState,...JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}")} }catch{return {...defaultState}}}
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function esc(s){return String(s??"").replace(/[&<>'"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[m]))}
function today(){return new Date().toISOString().slice(0,10)}
function completedCount(){return Object.keys(state.completed).length}
function completedExerciseCount(){return Object.keys(state.completedExercises).length}
function totalExerciseCount(){return LESSONS.reduce((a,l)=>a+l.exercises.length,0)}
function mastery(){return Math.round((completedExerciseCount()/Math.max(1,totalExerciseCount()))*100)}
function level(){return Math.floor((state.xp||0)/120)+1}
function starsFor(id){return state.completed[id]?.stars||0}
function starText(n){return "★".repeat(n)+"☆".repeat(3-n)}
function lesson(){return LESSONS[state.selectedLesson]||LESSONS[0]}
function exIndex(l=lesson()){return state.selectedExercise[l.id]??0}
function exercise(l=lesson()){return l.exercises[exIndex(l)]||l.exercises[0]}
function key(l=lesson(),e=exercise(l)){return `${l.id}:${e.id}`}
function stepOf(id){return state.step[id]||"learn"}
function canOpenLesson(i){if(i===0)return true;return !!state.completed[LESSONS[i-1].id]}
function nextLessonIndex(){const idx=LESSONS.findIndex(l=>!state.completed[l.id]);return idx<0?LESSONS.length-1:idx}
function updateStudyDay(){const t=today(); if(state.lastStudy===t)return; const y=new Date(Date.now()-86400000).toISOString().slice(0,10); state.streak=state.lastStudy===y?(state.streak||0)+1:1; state.lastStudy=t; save()}
function toast(msg){const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");clearTimeout(toast.t);toast.t=setTimeout(()=>el.classList.remove("show"),2400)}
function go(v){state.view=v;save();render();window.scrollTo({top:0,behavior:"smooth"})}
function selectLesson(i){if(!canOpenLesson(i)){toast("برای باز شدن این درس، درس قبلی را کامل کن.");return}state.selectedLesson=i;state.view="learn";save();render();window.scrollTo({top:0,behavior:"smooth"})}
function selectExercise(i){const l=lesson();state.selectedExercise[l.id]=i;save();renderPracticeOnly()}
function toggleTheme(){state.theme=state.theme==="dark"?"light":"dark";save();render()}
function navButton(id,label){return `<button class="${state.view===id?'active':''}" onclick="go('${id}')">${label}</button>`}
function render(){document.documentElement.dataset.theme=state.theme;document.getElementById("app").innerHTML = `
<header class="top"><div class="topin"><div class="brand"><div class="logo">Py</div><div><h1>Python Mastery</h1><p>آموزش عمیق، تمیز و تمرین‌محور پایتون</p></div></div><nav class="nav" aria-label="ناوبری اصلی">${navButton('home','خانه')}${navButton('learn','درس')}${navButton('review','مرور')}${navButton('projects','تمرین‌ها')}${navButton('profile','پروفایل')}</nav><button class="icon" onclick="toggleTheme()" title="تغییر تم">${state.theme==='dark'?'☀':'☾'}</button></div></header>
<div class="layout">${renderSide()}<main>${({home:renderHome,learn:renderLearn,review:renderReview,projects:renderProjects,profile:renderProfile}[state.view]||renderHome)()}</main></div>`; attachEditor(); }
function renderSide(){return `<aside class="side panel"><div class="pad"><div class="stats"><div class="stat"><small>درس‌ها</small><b>${completedCount()}/${LESSONS.length}</b></div><div class="stat"><small>تمرین‌ها</small><b>${completedExerciseCount()}/${totalExerciseCount()}</b></div><div class="stat"><small>سطح</small><b>${level()}</b></div><div class="stat"><small>روزها</small><b>${state.streak||0}</b></div></div><div class="progress" style="margin:14px 0 9px"><i style="width:${mastery()}%"></i></div><p class="small">قانون یادگیری: توضیح کامل، مثال زیاد، تمرین خالی، تست واقعی، مرور هدفمند.</p><button class="btn primary full" onclick="selectLesson(${nextLessonIndex()})">ادامه مسیر</button></div></aside>`}
function renderHome(){const l=LESSONS[nextLessonIndex()];return `<section><div class="hero"><div class="panel pad"><span class="tag">مینیمال، اما عمیق</span><h2>ظاهر آرام، آموزش غنی، تمرین واقعی.</h2><p>این اپلیکیشن برای یادگیری جدی طراحی شده است: توضیح‌ها کوتاهِ سطحی نیستند، مثال‌ها متعددند، و تمرین‌ها از قبل پر نشده‌اند. دانش‌آموز باید خودش کد را از صفر بنویسد.</p><div class="btnrow"><button class="btn primary" onclick="selectLesson(${nextLessonIndex()})">شروع / ادامه یادگیری</button><button class="btn" onclick="go('review')">مرور نقاط ضعف</button></div></div><div class="panel pad"><span class="tag">درس بعدی</span><h2 style="font-size:24px;margin:10px 0 6px">${esc(l.title)}</h2><p class="muted">${esc(l.summary)}</p><div class="notice">هدف: ${esc(l.bigIdea)}</div><button class="btn dark full" onclick="selectLesson(${nextLessonIndex()})">باز کردن درس</button></div></div><div class="section-title" style="margin-top:22px"><div><h2>مسیر یادگیری</h2><p>هر درس با تکمیل حداقل دو تمرین باز می‌شود.</p></div></div><div class="lesson-list">${LESSONS.map((x,i)=>renderLessonRow(x,i)).join("")}</div></section>`}
function renderLessonRow(l,i){const locked=!canOpenLesson(i);return `<button class="lesson-row ${i===state.selectedLesson?'active':''} ${locked?'locked':''}" onclick="selectLesson(${i})"><span class="num">${locked?'−':i+1}</span><span><h3>${esc(l.title)}</h3><p>${esc(l.chapter)} · ${esc(l.time)} · ${esc(l.skill)}</p></span><span class="stars">${starsFor(l.id)?starText(starsFor(l.id)):''}</span></button>`}
function renderLearn(){const l=lesson();const st=stepOf(l.id);return `<section><div class="section-title"><div><h2>کلاس درس</h2><p>اول بفهم، بعد پیش‌بینی کن، سپس از صفر کد بزن.</p></div><button class="btn" onclick="go('home')">نقشه</button></div><div class="learn-grid"><div class="panel pad"><div class="lesson-head"><h2>${esc(l.title)}</h2><div class="meta"><span class="tag">${esc(l.difficulty)}</span><span class="tag">${esc(l.time)}</span><span class="tag">${starText(starsFor(l.id))}</span></div></div>${renderStepper(l,st)}${renderLessonContent(l,st)}</div><div class="panel pad" id="practicePanel">${renderPractice(l)}</div></div></section>`}
function renderStepper(l,st){const done={learn:true,predict:!!state.predict[l.id],practice:completedForLesson(l).length>=1,mastery:!!state.completed[l.id]};const steps=[["learn","توضیح"],["predict","پیش‌بینی"],["practice","تمرین"],["mastery","تسلط"]];return `<div class="stepper">${steps.map(([id,label])=>`<div class="step ${st===id?'active':''} ${done[id]?'done':''}"><b>${label}</b><span>${done[id]?'انجام شد':st===id?'اکنون':'بعدی'}</span></div>`).join("")}</div>`}
function renderLessonContent(l,st){if(st==="predict")return renderPredict(l); if(st==="practice")return renderPracticeGuide(l); if(st==="mastery")return renderMastery(l); return renderArticle(l)}
function renderArticle(l){return `<div class="article"><div class="box"><h3>ایده اصلی</h3><p>${esc(l.bigIdea)}</p></div><h3>توضیح کامل</h3>${l.explanation.map(p=>`<p>${esc(p)}</p>`).join("")}<div class="box"><h3>مدل ذهنی</h3><p>${esc(l.mentalModel)}</p></div><h3>ساختارهای مهم</h3><pre>${esc(l.syntax.join("\n"))}</pre><h3>اشتباهات رایج</h3><ul class="bullets">${l.commonMistakes.map(x=>`<li>${esc(x)}</li>`).join("")}</ul><h3>مثال‌های آموزشی</h3>${l.examples.map(renderExample).join("")}<div class="btnrow"><button class="btn primary" onclick="setStep('predict')">رفتن به پیش‌بینی</button><button class="btn" onclick="document.getElementById('practicePanel').scrollIntoView({behavior:'smooth'})">دیدن تمرین‌ها</button></div></div>`}
function renderExample(ex){return `<div class="example"><h4>${esc(ex.title)}</h4><pre>${esc(ex.code)}</pre><div class="outlabel">خروجی</div><pre>${esc(ex.output)}</pre><p>${esc(ex.explain)}</p></div>`}
function renderPredict(l){return `<div class="article"><h3>پیش‌بینی قبل از اجرا</h3><p>یک برنامه‌نویس خوب قبل از زدن دکمه اجرا، حدس می‌زند خروجی چه خواهد بود. این کار مغز را مجبور می‌کند منطق کد را مرحله‌به‌مرحله دنبال کند.</p><pre>${esc(l.predict.code)}</pre><div>${l.predict.choices.map((ch,i)=>`<button class="choice" onclick="answerPredict(${i})">${esc(ch)}</button>`).join("")}</div><div class="notice">بعد از پاسخ درست، تمرین اصلی فعال می‌شود.</div></div>`}
function renderPracticeGuide(l){return `<div class="article"><h3>تمرین واقعی</h3><p>در پنل Code Lab تمرین را انتخاب کن و کد را از صفر بنویس. هیچ تمرینی از قبل پر نشده است. اگر قبلاً چیزی نوشته باشی، فقط همان تلاش خودت ذخیره و بازیابی می‌شود.</p><div class="notice warn">برای تکمیل این درس باید حداقل دو تمرین از سه تمرین را با تست موفق انجام دهی. بعد از چند تلاش ناموفق، راهنمایی مرحله‌ای کمک می‌کند، اما جواب آماده نمایش داده نمی‌شود.</div><ul class="bullets">${l.exercises.map((e,i)=>`<li>${completedExercise(l,e)?'✓':'○'} ${esc(e.title)} — ${esc(e.objective)}</li>`).join("")}</ul></div>`}
function renderMastery(l){const done=completedForLesson(l).length;return `<div class="article"><h3>ثبت تسلط</h3><p>تو ${done} تمرین از ${l.exercises.length} تمرین این درس را کامل کرده‌ای. برای تثبیت یادگیری، یک بازتاب کوتاه بنویس: این مفهوم در برنامه واقعی چه کاربردی دارد؟</p><textarea id="reflection" class="editor" style="min-height:130px;direction:rtl;text-align:right;background:var(--surface2);color:var(--text)" placeholder="مثلاً: از شرط‌ها برای باز کردن مرحله بعدی بازی استفاده می‌کنم..."></textarea><button class="btn ok" onclick="completeLesson()">ثبت و تکمیل درس</button></div>`}
function setStep(s){state.step[lesson().id]=s;save();render()}
function completedExercise(l,e){return !!state.completedExercises[`${l.id}:${e.id}`]}
function completedForLesson(l){return l.exercises.filter(e=>completedExercise(l,e))}
function renderPractice(l){const e=exercise(l);const k=key(l,e);const code=state.code[k]||"";return `<h2 style="font-size:20px;margin:0 0 8px">Code Lab</h2><p class="muted" style="margin:0 0 12px">تمرین را انتخاب کن. ادیتور برای تمرین جدید خالی است؛ باید خودت کد را بنویسی.</p><div class="tabs">${l.exercises.map((x,i)=>`<button class="tab ${i===exIndex(l)?'active':''}" onclick="selectExercise(${i})">${completedExercise(l,x)?'✓ ':''}${i+1}. ${esc(x.title)}</button>`).join("")}</div><div class="exercise-card"><h3>${esc(e.title)}</h3><p class="muted">${esc(e.objective)}</p><div class="checklist">${e.instructions.map(x=>`<div>${esc(x)}</div>`).join("")}</div></div><textarea id="editor" class="editor" spellcheck="false" dir="ltr" placeholder="# کد تمرین را خودت از صفر اینجا بنویس.\n# مثال‌ها فقط برای یادگیری‌اند؛ تمرین‌ها از قبل پر نمی‌شوند.">${esc(code)}</textarea><div class="btnrow" style="margin:10px 0"><button class="btn primary" onclick="runCode(false)">اجرای کد</button><button class="btn dark" onclick="runCode(true)">اجرای تست</button><button class="btn" onclick="clearExerciseCode()">خالی کردن</button><button class="btn" onclick="showHint()">راهنمایی مرحله‌ای</button></div><pre id="output" class="output">خروجی Python اینجا نمایش داده می‌شود.</pre><div id="feedback" class="notice">وقتی آماده شدی، کد را اجرا کن و سپس تست بگیر.</div>`}
function renderPracticeOnly(){const p=document.getElementById("practicePanel"); if(p){p.innerHTML=renderPractice(lesson()); attachEditor();}}
function attachEditor(){const ed=document.getElementById("editor"); if(!ed)return; ed.addEventListener("input",()=>{state.code[key()]=ed.value;save()})}
function answerPredict(i){const l=lesson();const buttons=[...document.querySelectorAll('.choice')];buttons.forEach((b,idx)=>{b.disabled=true;if(idx===l.predict.answer)b.classList.add('correct');if(idx===i&&idx!==l.predict.answer)b.classList.add('wrong')});if(i===l.predict.answer){state.predict[l.id]=true;state.xp+=10;state.step[l.id]="practice";save();setTimeout(render,650);toast("درست بود. حالا وقت تمرین واقعی است.")}else{markWeak(l,"پیش‌بینی خروجی");save();toast(l.predict.why)}}
function clearExerciseCode(){state.code[key()]="";save();const ed=document.getElementById('editor');if(ed)ed.value="";feedback("ادیتور خالی شد. تمرین را از صفر بنویس.")}
function showHint(){const l=lesson(), e=exercise(l), k=key(l,e);const n=state.hints[k]||0;state.hints[k]=n+1;markWeak(l,"نیاز به راهنمایی در تمرین");save();feedback("راهنمایی: "+e.hint[Math.min(n,e.hint.length-1)],n>0?'warn':'')}
function feedback(msg,type=""){const el=document.getElementById('feedback'); if(!el)return; el.className='notice '+type; el.textContent=msg}
function markWeak(l,reason){state.weak[l.id]={title:l.title,skill:l.skill,reason,count:((state.weak[l.id]||{}).count||0)+1}}
function friendlyError(err){if(err.includes('SyntaxError'))return 'خطای ساختار کد: احتمالاً پرانتز، نقل‌قول، دو نقطه یا تورفتگی را اشتباه نوشته‌ای.'; if(err.includes('NameError'))return 'یک نام تعریف نشده است. بررسی کن متغیر یا تابع را قبل از استفاده ساخته باشی و نامش را درست نوشته باشی.'; if(err.includes('IndentationError'))return 'خطای تورفتگی: خط‌های داخل if، for یا def باید با فاصله منظم جلوتر باشند.'; if(err.includes('TypeError'))return 'خطای نوع داده: احتمالاً عملیاتی روی نوع داده نامناسب انجام شده است.'; return 'کد اجرا نشد. پیام فنی: '+err.slice(0,220)}
let pyWorker=null, pyReady=false, pyBusy=false, runCounter=0;
function workerCode(){return `let ready=(async()=>{importScripts('https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js');self.pyodide=await loadPyodide({indexURL:'https://cdn.jsdelivr.net/pyodide/v0.26.4/full/'});})();self.onmessage=async(e)=>{const id=e.data.id, code=e.data.code;let out='',err='';try{await ready;pyodide.setStdout({batched:s=>{out+=s+'\\n'}});pyodide.setStderr({batched:s=>{err+=s+'\\n'}});await pyodide.runPythonAsync(code);self.postMessage({id,ok:true,out,err});}catch(ex){self.postMessage({id,ok:false,out,err,error:String(ex)});}};`}
function ensureWorker(){if(pyWorker)return pyWorker;const blob=new Blob([workerCode()],{type:'application/javascript'});pyWorker=new Worker(URL.createObjectURL(blob));return pyWorker}
function runPython(code){return new Promise((resolve,reject)=>{if(pyBusy){reject(new Error('یک اجرای دیگر در حال انجام است. چند لحظه صبر کن.'));return}pyBusy=true;const w=ensureWorker();const id=++runCounter;const timer=setTimeout(()=>{try{w.terminate()}catch{};pyWorker=null;pyBusy=false;reject(new Error('Timeout: اجرای کد بیش از حد طول کشید و متوقف شد.'))},7000);w.onmessage=(e)=>{if(e.data.id!==id)return;clearTimeout(timer);pyBusy=false;if(e.data.ok)resolve((e.data.out||'')+(e.data.err?('\n'+e.data.err):''));else reject(new Error((e.data.error||'خطای نامشخص')+(e.data.out?('\n'+e.data.out):''))) };w.onerror=(e)=>{clearTimeout(timer);pyBusy=false;reject(new Error(e.message||'خطای Worker'))};w.postMessage({id,code})})}
async function runCode(test){const l=lesson(), e=exercise(l), ed=document.getElementById('editor');const code=(ed?.value||'').trimEnd();state.code[key(l,e)]=code;state.runs=(state.runs||0)+1;state.attempts[key(l,e)]=(state.attempts[key(l,e)]||0)+1;save();if(!code.trim()){feedback('تمرین از قبل پر نمی‌شود؛ باید خودت حداقل چند خط کد بنویسی.','warn');return}document.getElementById('output').textContent='در حال آماده‌سازی/اجرای Python... بار اول ممکن است کمی طول بکشد.';feedback('در حال اجرا...');try{const out=await runPython(code);document.getElementById('output').textContent=out || '(بدون خروجی)'; if(test)grade(l,e,code,out); else feedback('کد اجرا شد. برای ثبت تمرین، تست را اجرا کن.','ok')}catch(err){document.getElementById('output').textContent=String(err.message||err);markWeak(l,'خطای اجرا');feedback(friendlyError(String(err.message||err)),'bad');save()}}
function norm(s){return String(s||'').toLowerCase().replace(/\s+/g,' ').trim()}
function grade(l,e,code,out){const nout=norm(out), ncode=String(code);let problems=[];for(const exp of e.expectedLines){if(!nout.includes(norm(exp)))problems.push(`خروجی باید شامل «${exp}» باشد.`)}for(const req of e.codeMust||[]){if(!ncode.includes(req))problems.push(`در کد باید از «${req}» استفاده شود.`)}if(problems.length){markWeak(l,'تست ناموفق');save();feedback('هنوز کامل نیست: '+problems.slice(0,2).join(' '),'bad');return}const k=key(l,e);if(!state.completedExercises[k]){state.completedExercises[k]={at:Date.now(),attempts:state.attempts[k]||1,hints:state.hints[k]||0};state.xp+=30;updateStudyDay()}const done=completedForLesson(l).length;if(done>=2){state.step[l.id]='mastery';feedback(`عالی. ${done} تمرین کامل شد. حالا درس را در مرحله تسلط ثبت کن.`,'ok')}else{state.step[l.id]='practice';feedback(`تمرین ثبت شد. برای تکمیل درس، حداقل ${2-done} تمرین دیگر لازم است.`,'ok')}save();render()}
function completeLesson(){const l=lesson();const done=completedForLesson(l).length;if(done<2){toast('برای تکمیل درس باید حداقل دو تمرین کامل شود.');state.step[l.id]='practice';save();render();return}const ref=(document.getElementById('reflection')?.value||'').trim();if(ref.length<18){toast('بازتاب باید حداقل یک جمله واقعی باشد.');return}const attempts=l.exercises.reduce((a,e)=>a+(state.attempts[`${l.id}:${e.id}`]||0),0);const hints=l.exercises.reduce((a,e)=>a+(state.hints[`${l.id}:${e.id}`]||0),0);const stars = done===l.exercises.length && hints<=2 ? 3 : done>=2 && hints<=4 ? 2 : 1;state.completed[l.id]={at:Date.now(),stars,reflection:ref};state.xp+=stars*35;delete state.weak[l.id];if(state.selectedLesson<LESSONS.length-1)state.selectedLesson++;state.view='home';save();render();toast('درس کامل شد و مرحله بعد باز شد.')}
function renderReview(){const weak=Object.values(state.weak);const flash=LESSONS.flatMap(l=>l.syntax.map(s=>({lesson:l.title,front:s,back:l.mentalModel})));const card=flash[(state.runs+completedExerciseCount())%flash.length];return `<section><div class="section-title"><div><h2>مرور هوشمند</h2><p>تمرکز روی خطاها، پیش‌بینی‌های غلط و راهنمایی‌های استفاده‌شده.</p></div></div><div class="grid2"><div class="panel pad"><h3>نقاط نیازمند تمرین</h3>${weak.length?`<div class="lesson-list">${weak.map(w=>`<div class="card"><h3>${esc(w.title)}</h3><p>${esc(w.skill)}</p><div class="notice warn">${esc(w.reason)} · تعداد: ${w.count}</div></div>`).join('')}</div>`:`<div class="empty">فعلاً نقطه ضعف جدی ثبت نشده است. چند تمرین دیگر انجام بده تا مرور دقیق‌تر شود.</div>`}</div><div class="panel pad"><h3>فلش‌کارت مفهومی</h3><div class="card flash"><div><span class="tag">${esc(card.lesson)}</span><br><br><b dir="ltr">${esc(card.front)}</b><p>${esc(card.back)}</p></div></div><button class="btn full" onclick="state.runs++;save();render()">کارت بعدی</button></div></div></section>`}
function renderProjects(){return `<section><div class="section-title"><div><h2>بانک تمرین و پروژه</h2><p>برای هر پروژه، ابتدا درس‌های لازم را کامل کن. تمرین‌ها همچنان خالی شروع می‌شوند.</p></div></div><div class="grid3">${PROJECTS.map(p=>`<div class="card"><span class="tag">${esc(p.level)}</span><h3>${esc(p.title)}</h3><p>${esc(p.desc)}</p><ul class="bullets">${p.parts.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`).join('')}</div></section>`}
const PROJECTS=[{title:'ماشین حساب XP',level:'پایه',desc:'با متغیر، عدد و f-string یک گزارش امتیاز بساز.',parts:['امتیاز چند مأموریت را محاسبه کن','جایزه را اضافه کن','نتیجه را با پیام واضح چاپ کن']},{title:'قفل مرحله بازی',level:'پایه تا متوسط',desc:'با شرط تصمیم بگیر مرحله باز شود یا قفل بماند.',parts:['XP را ذخیره کن','با if شرط باز شدن را بررسی کن','پیام انسانی چاپ کن']},{title:'برنامه تمرین هفتگی',level:'متوسط',desc:'با حلقه برنامه چند روز تمرین را بساز.',parts:['روزها را با range چاپ کن','مجموع زمان تمرین را حساب کن','گزارش نهایی بده']},{title:'کارت مهارت‌ها',level:'متوسط',desc:'با list و dictionary وضعیت یادگیری را مدل کن.',parts:['لیست مهارت‌ها بساز','پروفایل learner بساز','گزارش کامل چاپ کن']},{title:'تابع محاسبه سطح',level:'متوسط',desc:'با function محاسبه تکراری را تمیز کن.',parts:['تابع level_from_xp بساز','چند XP مختلف تست کن','نتیجه را گزارش کن']},{title:'مینی داشبورد یادگیری',level:'ترکیبی',desc:'چند مفهوم را در یک برنامه کوچک ترکیب کن.',parts:['dictionary برای کاربر','list برای درس‌ها','function برای گزارش','if برای وضعیت فعال']}];
function renderProfile(){return `<section><div class="section-title"><div><h2>پروفایل یادگیری</h2><p>اطلاعات روی همین مرورگر ذخیره می‌شود.</p></div></div><div class="grid2"><div class="panel pad"><div class="stats"><div class="stat"><small>XP</small><b>${state.xp||0}</b></div><div class="stat"><small>سطح</small><b>${level()}</b></div><div class="stat"><small>اجراها</small><b>${state.runs||0}</b></div><div class="stat"><small>تسلط</small><b>${mastery()}%</b></div></div><div class="btnrow" style="margin-top:14px"><button class="btn" onclick="exportProgress()">خروجی JSON</button><button class="btn warn" onclick="resetProgress()">حذف پیشرفت</button></div></div><div class="panel pad"><h3>اصول این اپ</h3><ul class="bullets"><li>ظاهر مینیمال برای کاهش حواس‌پرتی</li><li>توضیح غنی برای فهم واقعی، نه حفظ سریع</li><li>مثال‌های متعدد قبل از تمرین</li><li>تمرین‌های خالی برای تولید فعال کد</li><li>تست و مرور بر اساس عملکرد واقعی</li></ul></div></div></section>`}
function exportProgress(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='python-mastery-progress.json';a.click();URL.revokeObjectURL(a.href)}
function resetProgress(){if(confirm('همه پیشرفت‌ها حذف شود؟')){localStorage.removeItem(STORAGE_KEY);state=loadState();render()}}
render();
</script>
</body>
