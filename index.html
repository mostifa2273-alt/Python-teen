<script>
(() => {
'use strict';
const STORAGE_KEY = 'python_studio_best_learning_v1';
const TODAY = new Date().toISOString().slice(0,10);
const esc = s => String(s ?? '').replace(/[&<>'"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const clamp = (n,min,max)=>Math.max(min,Math.min(max,n));

const LESSONS = [
  {
    id:'print', title:'شروع واقعی: فکر کردن با print', skill:'خروجی، متن، عدد و کامنت', level:'مقدماتی', time:'۳۰ تا ۴۵ دقیقه',
    intro:'در اولین قدم قرار نیست فقط یک دستور حفظ کنی. قرار است بفهمی برنامه چگونه با انسان حرف می‌زند. در پایتون، دستور print ساده‌ترین راه برای دیدن نتیجه فکر برنامه است. هر وقت چیزی را محاسبه می‌کنی، می‌سازی یا بررسی می‌کنی، print مثل چراغی است که داخل ذهن برنامه را روشن می‌کند.',
    why:'بسیاری از مبتدی‌ها فکر می‌کنند برنامه‌نویسی یعنی نوشتن کدهای پیچیده. در واقع برنامه‌نویسی یعنی تبدیل یک فکر روشن به چند دستور کوچک. print کمک می‌کند هر دستور را ببینی، اشتباه را پیدا کنی و مطمئن شوی برنامه همان چیزی را انجام می‌دهد که تو می‌خواهی.',
    mental:'برنامه را مثل یک کارمند دقیق تصور کن. او چیزی را حدس نمی‌زند؛ فقط دستورهای تو را یکی‌یکی انجام می‌دهد. print یعنی از او می‌خواهی یک پیام یا نتیجه را روی صفحه گزارش کند.',
    concepts:[
      ['متن یا string','هر چیزی که داخل کوتیشن قرار بگیرد متن است، حتی اگر شبیه عدد باشد.'],
      ['عدد','عددها بدون کوتیشن نوشته می‌شوند و پایتون می‌تواند روی آن‌ها محاسبه انجام دهد.'],
      ['کامنت','متنی برای انسان است، نه برای اجرای برنامه. با # شروع می‌شود.'],
      ['ترتیب اجرا','پایتون از بالا به پایین اجرا می‌کند، پس ترتیب خط‌ها مهم است.']
    ],
    syntax:['print("Hello")','print(2 + 3)','# this is a comment'],
    mistakes:['فراموش کردن پرانتز در print','استفاده نامنظم از کوتیشن‌ها مثل "hello\'','انتظار محاسبه از متنی که داخل کوتیشن است: print("2+3") فقط متن را چاپ می‌کند.'],
    examples:[
      {title:'چاپ پیام ساده', code:'print("سلام، من امروز پایتون را شروع کردم")', out:'سلام، من امروز پایتون را شروع کردم', explain:'متن داخل کوتیشن دقیقاً چاپ می‌شود. کوتیشن در خروجی دیده نمی‌شود؛ فقط به پایتون می‌گوید این قسمت متن است.'},
      {title:'چاپ نتیجه محاسبه', code:'print(12 + 8)\nprint(5 * 3)', out:'20\n15', explain:'وقتی عددها داخل کوتیشن نیستند، پایتون آن‌ها را محاسبه می‌کند و نتیجه را چاپ می‌کند.'},
      {title:'چند خط خروجی برای گزارش', code:'# گزارش کوچک تمرین\nprint("تمرین امروز")\nprint("دقیقه:", 25)\nprint("وضعیت:", "کامل شد")', out:'تمرین امروز\nدقیقه: 25\nوضعیت: کامل شد', explain:'print می‌تواند چند چیز را با کاما چاپ کند. بین آن‌ها فاصله می‌گذارد.'},
      {title:'تفاوت متن و محاسبه', code:'print("2 + 3")\nprint(2 + 3)', out:'2 + 3\n5', explain:'خط اول متن را چاپ می‌کند. خط دوم محاسبه را انجام می‌دهد.'}
    ],
    predict:{question:'خروجی این کد چیست؟', code:'print("Level")\nprint(10 + 5)\nprint("10 + 5")', options:['Level\n15\n10 + 5','Level\n10 + 5\n15','"Level"\n15\n"10 + 5"','Level 15 10 + 5'], answer:0, why:'خط دوم محاسبه می‌شود، اما خط سوم داخل کوتیشن است و همان متن چاپ می‌شود.'},
    exercises:[
      {id:'p1', title:'کارت معرفی کوتاه', goal:'سه خط چاپ کن: نام، هدف یادگیری، و تعداد دقیقه تمرین امروز.', rules:['باید دقیقاً یا حداقل شامل نام دلخواه باشد.','باید یک عدد برای دقیقه تمرین چاپ شود.','باید سه خط خروجی داشته باشد.'], expected:['نام','هدف','30'], must:['print('], hint:['با سه دستور print شروع کن.','برای دقیقه تمرین می‌توانی عدد 30 را بدون کوتیشن یا همراه متن چاپ کنی.','نمونه ساختار: print("نام: ...") اما متن دقیق را خودت بنویس.']},
      {id:'p2', title:'گزارش امتیاز بازی', goal:'نتیجه دو مأموریت را محاسبه و چاپ کن: 40 + 25 و سپس پیام «مرحله بعد آماده است».', rules:['خروجی باید عدد 65 را نشان دهد.','باید پیام مرحله بعد را چاپ کند.','محاسبه باید در کد دیده شود، نه فقط عدد نهایی.'], expected:['65','مرحله بعد آماده است'], must:['40','25','+','print('], hint:['یک print برای محاسبه و یک print برای پیام بنویس.','اگر print("40 + 25") بنویسی، محاسبه نمی‌شود.','عددها را بدون کوتیشن محاسبه کن.']},
      {id:'p3', title:'برنامه روزانه', goal:'چهار خط درباره برنامه امروز چاپ کن: عنوان، درس، تمرین، پایان.', rules:['باید حداقل چهار print داشته باشد.','باید کلمات عنوان، درس، تمرین، پایان در خروجی دیده شوند.'], expected:['عنوان','درس','تمرین','پایان'], must:['print('], hint:['هر بخش را در یک خط جدا چاپ کن.','از متن‌های کوتاه و واضح استفاده کن.','کامنت اختیاری است اما خوانایی را بهتر می‌کند.']},
      {id:'p4', title:'اشتباه‌یابی خروجی', goal:'دو خط بساز که اولی متن 7 + 2 را چاپ کند و دومی نتیجه واقعی آن را چاپ کند.', rules:['خروجی باید هم «7 + 2» و هم «9» را داشته باشد.','باید تفاوت متن و محاسبه را نشان دهد.'], expected:['7 + 2','9'], must:['print('], hint:['یکی را داخل کوتیشن بگذار.','دیگری را بدون کوتیشن محاسبه کن.','به ترتیب خروجی دقت کن.']}
    ]
  },
  {

      {title:'تست کوچک تابع', code:'def add(a, b):\n    return a + b\n\nprint(add(2, 3))\nprint(add(10, 5))', out:'5\n15', explain:'تابع را با چند ورودی ساده تست می‌کنیم تا مطمئن شویم درست کار می‌کند.'},
      {title:'بررسی نوع داده', code:'value = "42"\nprint(type(value))\nvalue = int(value)\nprint(type(value))', out:"<class 'str'>\n<class 'int'>", explain:'وقتی شک داری مقدار متن است یا عدد، type کمک می‌کند.'}
    ],
    predict:{question:'کدام خطا محتمل‌تر است؟', code:'score = 10\nprint(scroe)', options:['SyntaxError','NameError','TypeError','هیچ خطایی ندارد'], answer:1, why:'نام متغیر score ساخته شده، اما scroe اشتباه تایپی است؛ پس NameError رخ می‌دهد.'},
    exercises:[
      {id:'b1', title:'چک‌پوینت‌گذاری', goal:'کدی بنویس که مقدار xp را قبل و بعد از اضافه شدن 25 چاپ کند.', rules:['باید قبل و بعد در خروجی دیده شود.','نتیجه نهایی باید 125 باشد.'], expected:['قبل','بعد','125'], must:['print','xp','25'], hint:['xp = 100 شروع کن.','قبل از تغییر print کن.','بعد از xp = xp + 25 دوباره print کن.']},
      {id:'b2', title:'رفع خطای نوع', goal:'متن "30" را به عدد تبدیل کن، 5 اضافه کن و نوع قبل و بعد را چاپ کن.', rules:['باید type و int استفاده شود.','خروجی باید str، int و 35 را داشته باشد.'], expected:['str','int','35'], must:['type','int','30'], hint:['اول value = "30" بساز.','type(value) را چاپ کن.','بعد value = int(value) و دوباره type را چاپ کن.']},
      {id:'b3', title:'تست تابع با چند ورودی', goal:'تابع multiply بساز و آن را با دو ورودی مختلف تست کن تا 12 و 20 چاپ شود.', rules:['باید def و return استفاده شود.','باید دو بار تابع صدا زده شود.'], expected:['12','20'], must:['def','return','multiply'], hint:['def multiply(a,b):','return a * b','print(multiply(3,4)) و یک تست دیگر.']},
      {id:'b4', title:'ردیابی تصمیم', goal:'score را چاپ کن، سپس با if مشخص کن قبول است یا نیاز به تمرین. مقدار را طوری بگذار که «نیاز به تمرین» چاپ شود.', rules:['باید score is یا score در خروجی باشد.','باید نیاز به تمرین چاپ شود.'], expected:['score','نیاز به تمرین'], must:['if','else','print'], hint:['score را کمتر از 60 بگذار.','قبل از if مقدار را چاپ کن.','در else پیام نیاز به تمرین را چاپ کن.']}
    ]
  }
];

  {title:'برنامه تمرین هفتگی', level:'متوسط', desc:'با حلقه و لیست برنامه چند روز تمرین را تولید کن.', parts:['لیست روزها را بساز','برای هر روز یک مأموریت چاپ کن','مجموع دقیقه‌ها را محاسبه کن']},
  {title:'پروفایل یادگیری', level:'متوسط', desc:'با دیکشنری و تابع، اطلاعات یک دانش‌آموز را مدل کن.', parts:['دیکشنری profile بساز','تابع report بنویس','سطح و نشان را گزارش کن']},
  {title:'موتور بازخورد تمرین', level:'ترکیبی', desc:'با تابع و شرط، بر اساس امتیاز پیام مناسب بساز.', parts:['تابع feedback(score) بساز','سه سطح پیام بده','چند نمره را تست کن']},
  {title:'ردیاب خطا', level:'ترکیبی', desc:'با type و printهای چک‌پوینت، مقدارها را مرحله‌ای بررسی کن.', parts:['قبل و بعد از تبدیل نوع چاپ کن','نتیجه محاسبه را بررسی کن','گزارش نهایی بده']},
  {title:'مینی اپ مرور', level:'چالش', desc:'لیست مهارت‌ها، دیکشنری وضعیت و تابع گزارش را ترکیب کن.', parts:['skills را در لیست نگه‌دار','progress را در dict نگه‌دار','تابع summary بنویس']}
];

function defaultState(){return {view:'home', selected:0, exerciseIndex:{}, code:{}, prediction:{}, completedExercises:{}, completedLessons:{}, attempts:{}, hints:{}, weak:{}, xp:0, runs:0, lastDay:null, streak:0, theme:'light', notes:{}, reflections:{}, lastViewAt:Date.now()};}
function load(){try{const raw=localStorage.getItem(STORAGE_KEY);return Object.assign(defaultState(), raw?JSON.parse(raw):{});}catch{return defaultState();}}
let state = load();
function save(){state.lastViewAt=Date.now();localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function completedLessonCount(){return Object.keys(state.completedLessons||{}).length;}
function exerciseKey(l,e){return `${l.id}:${e.id}`;}
function currentLesson(){return LESSONS[clamp(state.selected||0,0,LESSONS.length-1)];}
function currentExercise(l=currentLesson()){const idx=state.exerciseIndex[l.id]||0;return l.exercises[clamp(idx,0,l.exercises.length-1)];}
function isUnlocked(i){if(i===0)return true;return !!state.completedLessons[LESSONS[i-1].id];}
function lessonProgress(l){const done=l.exercises.filter(e=>state.completedExercises[exerciseKey(l,e)]).length;return {done,total:l.exercises.length,percent:Math.round(done/l.exercises.length*100)};}
function coursePercent(){return Math.round(completedLessonCount()/LESSONS.length*100);}
function level(){return Math.floor((state.xp||0)/250)+1;}
function studiedToday(){return state.lastDay===TODAY;}
function touchStudyDay(){if(state.lastDay!==TODAY){state.streak=(state.lastDay?((Date.now()-new Date(state.lastDay).getTime())<172800000?(state.streak||0)+1:1):1);state.lastDay=TODAY;}}
function setView(v){state.view=v;save();render();}
function selectLesson(i){if(!isUnlocked(i)){toast('این درس هنوز قفل است. درس قبلی را با تمرین واقعی کامل کن.');return;}state.selected=i;state.view='learn';save();render();window.scrollTo({top:0,behavior:'smooth'});}
function setExercise(i){const l=currentLesson();state.exerciseIndex[l.id]=i;save();render();}
function currentCode(){const l=currentLesson(), e=currentExercise(l);return state.code[exerciseKey(l,e)]||'';}
function codeChanged(v){const l=currentLesson(), e=currentExercise(l);state.code[exerciseKey(l,e)]=v;save();}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>el.classList.remove('show'),3600);}
function stars(n){return '★'.repeat(n||0)+'☆'.repeat(3-(n||0));}

function shell(content){const navs=[['home','مسیر'],['learn','درس'],['review','مرور'],['projects','پروژه‌ها'],['profile','پروفایل']];return `
<header class="top"><div class="topin"><div class="brand"><div class="logo">Py</div><div><h1>Python Studio</h1><p>آموزش عمیق، تمیز و تمرین‌محور برای نوجوانان</p></div></div><nav class="nav" aria-label="main navigation">${navs.map(([id,label])=>`<button class="${state.view===id?'active':''}" onclick="setView('${id}')">${label}</button>`).join('')}</nav><button class="icon" onclick="toggleTheme()" title="تغییر تم">◐</button></div></header>
<div class="layout"><aside class="side">${renderSide()}</aside><main>${content}</main></div><div class="footer">One-file production learning app · progress is saved locally in this browser</div>`;}
function renderSide(){return `<div class="panel pad"><div class="section-title"><div><h2 style="font-size:19px">پیشرفت دوره</h2><p>${completedLessonCount()} از ${LESSONS.length} درس کامل شده</p></div></div><div class="stats"><div class="stat"><small>XP</small><b>${state.xp||0}</b></div><div class="stat"><small>سطح</small><b>${level()}</b></div><div class="stat"><small>Streak</small><b>${state.streak||0}</b></div><div class="stat"><small>تسلط</small><b>${coursePercent()}%</b></div></div><div class="coursebar"><div class="progress"><i style="width:${coursePercent()}%"></i></div><div class="mini">برای تکمیل هر درس: پیش‌بینی درست + حداقل ۳ تمرین کامل + بازتاب کوتاه.</div></div><div class="lesson-list">${LESSONS.map((l,i)=>{const p=lessonProgress(l), comp=state.completedLessons[l.id], locked=!isUnlocked(i);return `<button class="lesson-row ${state.selected===i?'active':''} ${locked?'locked':''}" onclick="selectLesson(${i})"><span class="num">${locked?'×':(comp?'✓':i+1)}</span><span><h3>${esc(l.title)}</h3><p>${esc(l.skill)} · ${p.done}/${p.total} تمرین</p><div class="progress thin"><i style="width:${p.percent}%"></i></div></span><span class="stars">${comp?stars(comp.stars):''}</span></button>`;}).join('')}</div><div class="sidebar-actions"><button class="btn full" onclick="continueLearning()">ادامه یادگیری</button><button class="btn full" onclick="setView('review')">مرور نقاط ضعف</button></div></div>`;}
function continueLearning(){const idx=LESSONS.findIndex(l=>!state.completedLessons[l.id] && isUnlocked(LESSONS.indexOf(l)));state.selected=idx<0?LESSONS.length-1:idx;state.view='learn';save();render();}
function toggleTheme(){state.theme=state.theme==='dark'?'light':'dark';document.documentElement.dataset.theme=state.theme;save();}

document.documentElement.dataset.theme=state.theme||'light';

function renderHome(){const next=LESSONS.find((l,i)=>!state.completedLessons[l.id]&&isUnlocked(i))||LESSONS[LESSONS.length-1];const nextIdx=LESSONS.indexOf(next);return `<section class="hero"><div class="panel pad"><span class="tag brand">مسیر یادگیری تولیدمحور</span><h2>پایتون را واقعاً یاد بگیر؛ نه فقط تماشا کن.</h2><p>این اپ به جای درس‌های کوتاه و سطحی، هر مفهوم را با توضیح کامل، مثال‌های متعدد، پیش‌بینی خروجی، تمرین خالی، تست خودکار و بازتاب یادگیری جلو می‌برد. محیط عمداً مینیمال است تا تمرکز روی فهم و کدنویسی بماند.</p><div class="btnrow"><button class="btn primary" onclick="selectLesson(${nextIdx})">شروع/ادامه: ${esc(next.title)}</button><button class="btn" onclick="setView('review')">مرور هوشمند</button><button class="btn" onclick="setView('projects')">دیدن پروژه‌ها</button></div></div><div class="panel pad"><h3 style="margin-top:0">اصل‌های طراحی یادگیری</h3><div class="principles"><div class="principle"><span class="dot">1</span><span><b>توضیح عمیق، صفحه تمیز</b>متن آموزشی کامل است، اما هر بخش در کارت‌های آرام و قابل هضم نمایش داده می‌شود.</span></div><div class="principle"><span class="dot">2</span><span><b>تمرین از صفر</b>هیچ تمرینی از قبل پر نشده است. مثال‌ها جدا هستند؛ کد تمرین را خودت می‌سازی.</span></div><div class="principle"><span class="dot">3</span><span><b>تسلط واقعی</b>فقط کلیک کردن کافی نیست؛ باید پیش‌بینی، اجرا، تست و بازتاب انجام شود.</span></div><div class="principle"><span class="dot">4</span><span><b>بازی‌سازی آرام</b>XP و streak وجود دارد، اما حواس‌پرت‌کننده نیست و فقط رفتار درست یادگیری را تقویت می‌کند.</span></div></div></div></section><section style="margin-top:16px"><div class="section-title"><div><h2>نقشه دوره</h2><p>هر درس بعد از تسلط روی درس قبلی باز می‌شود.</p></div></div><div class="grid3">${LESSONS.map((l,i)=>{const p=lessonProgress(l), comp=state.completedLessons[l.id];return `<div class="card"><span class="tag ${comp?'ok':isUnlocked(i)?'brand':'warn'}">${comp?'کامل شده':isUnlocked(i)?'آماده':'قفل'}</span><h3>${esc(l.title)}</h3><p>${esc(l.intro).slice(0,160)}...</p><div class="progress"><i style="width:${p.percent}%"></i></div><div class="mini" style="margin-top:7px">${p.done}/${p.total} تمرین · ${esc(l.time)}</div><button class="btn full" style="margin-top:11px" onclick="selectLesson(${i})" ${isUnlocked(i)?'':'disabled'}>${comp?'مرور درس':'ورود به درس'}</button></div>`;}).join('')}</div></section>`;}

function renderLearn(){const l=currentLesson();const p=lessonProgress(l);const comp=state.completedLessons[l.id];const predictDone=!!state.prediction[l.id];return `<section class="learn-layout"><div class="panel pad"><div class="lesson-head"><div class="meta"><span class="tag brand">${esc(l.level)}</span><span class="tag">${esc(l.time)}</span><span class="tag">${p.done}/${p.total} تمرین کامل</span>${comp?`<span class="tag ok">تسلط ثبت شده</span>`:''}</div><h2>${esc(l.title)}</h2><p class="muted">${esc(l.skill)}</p></div><div class="stepper"><div class="step done"><b>۱. فهم</b>توضیح و مدل ذهنی</div><div class="step done"><b>۲. مثال</b>چند نمونه واقعی</div><div class="step ${predictDone?'done':'active'}"><b>۳. پیش‌بینی</b>قبل از کدنویسی</div><div class="step ${p.done>=3?'done':predictDone?'active':''}"><b>۴. تمرین</b>کدنویسی از صفر</div><div class="step ${comp?'done':p.done>=3?'active':''}"><b>۵. تسلط</b>بازتاب و تکمیل</div></div>${renderLessonArticle(l)}${renderPrediction(l)}${renderPractice(l)}${renderMastery(l)}</div><aside class="sticky-card"><div class="panel pad"><h3 style="margin-top:0">راهنمای یادگیری این درس</h3><ul class="bullets compact"><li>اول توضیح را کامل بخوان و سعی کن مثال‌ها را با صدای ذهنی اجرا کنی.</li><li>در بخش پیش‌بینی، قبل از جواب دادن خروجی را خط‌به‌خط حدس بزن.</li><li>تمرین‌ها عمداً خالی هستند. از مثال‌ها الهام بگیر، اما کد تمرین را خودت بساز.</li><li>بعد از هر خطا، فقط یک چیز را تغییر بده و دوباره تست کن.</li></ul><div class="notice ${p.done>=3?'ok':'warn'}">برای تکمیل درس، حداقل ۳ تمرین از ${l.exercises.length} تمرین باید تست موفق بگیرند.</div><button class="btn full" onclick="document.getElementById('practice-zone')?.scrollIntoView({behavior:'smooth'})">رفتن به تمرین‌ها</button></div></aside></section>`;}
function renderLessonArticle(l){return `<article class="article"><div class="box callout"><h3>ایده اصلی</h3><p>${esc(l.intro)}</p></div><div class="box"><h3>چرا این مفهوم مهم است؟</h3><p>${esc(l.why)}</p></div><div class="box soft"><h3>مدل ذهنی ساده</h3><p>${esc(l.mental)}</p></div><div><h3>مفاهیم کلیدی</h3><div class="concept-grid">${l.concepts.map(([a,b])=>`<div class="concept"><b dir="ltr">${esc(a)}</b><span>${esc(b)}</span></div>`).join('')}</div></div><div><h3>الگوهای نحوی مهم</h3><pre>${esc(l.syntax.join('\n\n'))}</pre></div><div><h3>مثال‌های توضیحی</h3><div class="examples">${l.examples.map(ex=>`<div class="example"><h4>${esc(ex.title)}</h4><pre>${esc(ex.code)}</pre><div class="outlabel">خروجی</div><pre>${esc(ex.out)}</pre><p>${esc(ex.explain)}</p></div>`).join('')}</div></div><div class="box"><h3>اشتباه‌های رایج</h3><ul class="bullets">${l.mistakes.map(m=>`<li>${esc(m)}</li>`).join('')}</ul></div></article>`;}
function renderPrediction(l){const done=!!state.prediction[l.id];return `<section class="box" style="margin-top:14px"><div class="section-title"><div><h2 style="font-size:21px">پیش‌بینی خروجی</h2><p>قبل از اجرای کد، مثل یک مفسر پایتون فکر کن.</p></div>${done?'<span class="tag ok">انجام شد</span>':'<span class="tag warn">لازم برای تکمیل</span>'}</div><p>${esc(l.predict.question)}</p><pre>${esc(l.predict.code)}</pre><div>${l.predict.options.map((o,i)=>`<button class="choice" onclick="answerPredict(${i})" ${done?'disabled':''}>${esc(o).replace(/\n/g,'<br>')}</button>`).join('')}</div><div id="predict-feedback-${l.id}" class="mini">${done?'پیش‌بینی این درس کامل شده است.':''}</div></section>`;}
function renderPractice(l){const e=currentExercise(l);const k=exerciseKey(l,e);const done=!!state.completedExercises[k];return `<section id="practice-zone" class="box" style="margin-top:14px"><div class="section-title"><div><h2 style="font-size:21px">تمرین‌های کدنویسی</h2><p>هر تمرین از صفر شروع می‌شود. اگر قبلاً چیزی نوشته باشی، فقط همان پیشرفت خودت ذخیره می‌شود.</p></div><span class="tag ${done?'ok':'brand'}">${done?'این تمرین کامل شده':'کد را خودت بنویس'}</span></div><div class="tabs">${l.exercises.map((ex,i)=>`<button class="tab ${(state.exerciseIndex[l.id]||0)===i?'active':''}" onclick="setExercise(${i})">تمرین ${i+1}${state.completedExercises[exerciseKey(l,ex)]?' ✓':''}</button>`).join('')}</div><div class="exercise-card"><h3>${esc(e.title)}</h3><p class="muted">${esc(e.goal)}</p><div class="checklist">${e.rules.map(r=>`<div>• ${esc(r)}</div>`).join('')}</div></div><div class="editor-wrap"><textarea id="editor" class="editor" spellcheck="false" autocomplete="off" autocapitalize="off" placeholder="کد تمرین را از صفر اینجا بنویس..." oninput="codeChanged(this.value)">${esc(currentCode())}</textarea></div><div class="btnrow" style="margin-top:10px"><button class="btn primary" onclick="runCurrent(false)">اجرای کد</button><button class="btn ok" onclick="runCurrent(true)">اجرای تست و ثبت</button><button class="btn" onclick="showHint()">راهنمایی مرحله‌ای</button><button class="btn" onclick="clearEditor()">خالی کردن ادیتور</button></div><div id="feedback" class="notice">خروجی و نتیجه تست اینجا نمایش داده می‌شود. تمرین‌ها عمداً pre-filled نیستند.</div><div class="outlabel">خروجی Python</div><pre id="output" class="output">هنوز چیزی اجرا نشده است.</pre></section>`;}
function renderMastery(l){const p=lessonProgress(l);const predictDone=!!state.prediction[l.id];const comp=state.completedLessons[l.id];const reflection=state.reflections[l.id]||'';return `<section class="box" style="margin-top:14px"><div class="section-title"><div><h2 style="font-size:21px">ثبت تسلط</h2><p>بازتاب کوتاه کمک می‌کند یادگیری از حالت انجام تمرین به فهم پایدار تبدیل شود.</p></div>${comp?'<span class="tag ok">کامل شده</span>':'<span class="tag warn">در انتظار تکمیل</span>'}</div><ul class="bullets compact"><li>${predictDone?'✓':'○'} پیش‌بینی خروجی انجام شده</li><li>${p.done>=3?'✓':'○'} حداقل ۳ تمرین موفق: ${p.done}/${p.total}</li><li>${comp?'✓':'○'} بازتاب یادگیری ثبت شده</li></ul><textarea id="reflection" class="reflect" placeholder="با زبان خودت بنویس: این درس چه چیزی را برایت روشن کرد؟ کجا اشتباه کردی؟ دفعه بعد چگونه فکر می‌کنی؟" oninput="saveReflection(this.value)">${esc(reflection)}</textarea><button class="btn dark full" style="margin-top:10px" onclick="completeLesson()">ثبت تسلط و باز کردن درس بعدی</button></section>`;}
function saveReflection(v){const l=currentLesson();state.reflections[l.id]=v;save();}

function answerPredict(i){const l=currentLesson(), p=l.predict;const choices=[...document.querySelectorAll('.choice')];choices.forEach((b,idx)=>{b.disabled=true;if(idx===p.answer)b.classList.add('correct');if(idx===i&&idx!==p.answer)b.classList.add('wrong');});const fb=document.getElementById(`predict-feedback-${l.id}`);if(i===p.answer){state.prediction[l.id]=true;state.xp+=12;touchStudyDay();save();if(fb)fb.textContent='درست بود. حالا وارد تمرین کدنویسی شو.';toast('پیش‌بینی درست بود.');setTimeout(render,700);}else{markWeak(l,'پیش‌بینی خروجی',p.why);save();if(fb)fb.textContent=p.why;toast('جواب غلط بود، اما همین خطا برای مرور ثبت شد.');}}
function showHint(){const l=currentLesson(), e=currentExercise(l), k=exerciseKey(l,e);const n=state.hints[k]||0;state.hints[k]=n+1;markWeak(l,'استفاده از راهنمایی',e.title);save();feedback('راهنمایی: '+e.hint[Math.min(n,e.hint.length-1)], n?'warn':'');}
function clearEditor(){const l=currentLesson(), e=currentExercise(l);state.code[exerciseKey(l,e)]='';save();const ed=document.getElementById('editor');if(ed)ed.value='';feedback('ادیتور خالی شد. دوباره از صفر شروع کن.','warn');}
function feedback(msg,type=''){const el=document.getElementById('feedback');if(!el)return;el.className='notice '+type;el.textContent=msg;}
function output(msg){const el=document.getElementById('output');if(el)el.textContent=msg;}
function markWeak(l,reason,detail=''){state.weak[l.id]={title:l.title,skill:l.skill,reason,detail,count:((state.weak[l.id]||{}).count||0)+1,at:Date.now()};}
function norm(s){return String(s||'').toLowerCase().replace(/[\u200c\s]+/g,' ').trim();}
function friendlyError(err){const m=String(err||'');if(m.includes('SyntaxError'))return 'خطای ساختار کد: احتمالاً پرانتز، کوتیشن، دو نقطه یا ترتیب نوشتن را اشتباه نوشته‌ای.';if(m.includes('NameError'))return 'NameError: از نامی استفاده شده که پایتون آن را نمی‌شناسد. نام متغیر/تابع را بررسی کن.';if(m.includes('IndentationError'))return 'IndentationError: تورفتگی خط‌های داخل if، for یا def باید منظم باشد.';if(m.includes('TypeError'))return 'TypeError: نوع داده برای این عملیات مناسب نیست. شاید متن را با عدد جمع کرده‌ای یا تبدیل نوع لازم است.';if(m.includes('KeyError'))return 'KeyError: کلیدی را از دیکشنری خواسته‌ای که وجود ندارد یا نامش متفاوت نوشته شده است.';return 'کد اجرا نشد. پیام فنی: '+m.slice(0,260);}

let pyWorker=null, runId=0, busy=false;
function workerSource(){return `let ready=(async()=>{importScripts('https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js');self.pyodide=await loadPyodide({indexURL:'https://cdn.jsdelivr.net/pyodide/v0.26.4/full/'});})();self.onmessage=async(e)=>{const id=e.data.id;let out='';let err='';try{await ready;pyodide.setStdout({batched:s=>{out+=s+'\\n'}});pyodide.setStderr({batched:s=>{err+=s+'\\n'}});await pyodide.runPythonAsync(e.data.code);self.postMessage({id,ok:true,out,err});}catch(ex){self.postMessage({id,ok:false,out,err,error:String(ex)});}}`;}
function ensureWorker(){if(pyWorker)return pyWorker;const blob=new Blob([workerSource()],{type:'application/javascript'});pyWorker=new Worker(URL.createObjectURL(blob));return pyWorker;}
function runPython(code){return new Promise((resolve,reject)=>{if(busy){reject(new Error('یک اجرای دیگر هنوز تمام نشده است. چند لحظه صبر کن.'));return;}busy=true;const w=ensureWorker();const id=++runId;const timer=setTimeout(()=>{try{w.terminate();}catch{}pyWorker=null;busy=false;reject(new Error('Timeout: اجرای کد بیش از حد طول کشید و متوقف شد.'));},8000);w.onmessage=e=>{if(e.data.id!==id)return;clearTimeout(timer);busy=false;if(e.data.ok)resolve((e.data.out||'')+(e.data.err?('\n'+e.data.err):''));else reject(new Error((e.data.error||'خطای نامشخص')+(e.data.out?('\n'+e.data.out):'')));};w.onerror=e=>{clearTimeout(timer);busy=false;reject(new Error(e.message||'خطای Worker یا بارگذاری Pyodide. اتصال اینترنت را بررسی کن.'));};w.postMessage({id,code});});}
async function runCurrent(test){const l=currentLesson(), e=currentExercise(l), k=exerciseKey(l,e);const ed=document.getElementById('editor');const code=(ed?.value||'').trimEnd();state.code[k]=code;state.runs=(state.runs||0)+1;state.attempts[k]=(state.attempts[k]||0)+1;save();if(!code.trim()){feedback('تمرین‌ها از قبل پر نمی‌شوند. باید خودت کد را از صفر بنویسی.','warn');output('');return;}feedback('در حال اجرا... بار اول ممکن است Pyodide چند ثانیه زمان ببرد.');output('در حال آماده‌سازی Python...');try{const out=await runPython(code);output(out||'(بدون خروجی)');if(test)grade(l,e,code,out);else feedback('کد اجرا شد. برای ثبت تمرین، تست را اجرا کن.','ok');}catch(err){output(String(err.message||err));markWeak(l,'خطای اجرا',String(err.message||err).slice(0,180));feedback(friendlyError(err.message||err),'bad');save();}}
function grade(l,e,code,out){const nout=norm(out), ncode=String(code);let problems=[];for(const exp of e.expected){if(!nout.includes(norm(exp)))problems.push(`خروجی باید شامل «${exp}» باشد.`);}for(const m of e.must){if(!ncode.includes(m))problems.push(`در کد باید از «${m}» استفاده شود.`);}if(problems.length){markWeak(l,'تست ناموفق',problems.join(' '));save();feedback('هنوز کامل نیست: '+problems.slice(0,3).join(' '),'bad');return;}const k=exerciseKey(l,e);if(!state.completedExercises[k]){state.completedExercises[k]={at:Date.now(),attempts:state.attempts[k]||1,hints:state.hints[k]||0};state.xp+=34;touchStudyDay();}delete state.weak[l.id];save();const p=lessonProgress(l);feedback(`عالی. تمرین ثبت شد. پیشرفت این درس: ${p.done}/${p.total} تمرین موفق.`,'ok');setTimeout(render,850);}
function completeLesson(){const l=currentLesson(), p=lessonProgress(l);if(!state.prediction[l.id]){toast('اول بخش پیش‌بینی خروجی را کامل کن.');return;}if(p.done<3){toast('برای تکمیل درس، حداقل سه تمرین باید تست موفق بگیرند.');return;}const ref=(state.reflections[l.id]||'').trim();if(ref.length<35){toast('بازتاب باید واقعی‌تر باشد؛ حداقل یک جمله کامل درباره فهم یا خطاها بنویس.');return;}const totalHints=l.exercises.reduce((a,e)=>a+(state.hints[exerciseKey(l,e)]||0),0);const starsCount=p.done===l.exercises.length&&totalHints<=3?3:p.done>=3&&totalHints<=6?2:1;state.completedLessons[l.id]={at:Date.now(),stars:starsCount,reflection:ref};state.xp+=starsCount*45;touchStudyDay();if(state.selected<LESSONS.length-1)state.selected++;state.view='home';save();render();toast('درس کامل شد. مرحله بعد باز شد.');}

function renderReview(){const weak=Object.values(state.weak||{}).sort((a,b)=>(b.count||0)-(a.count||0));const cards=LESSONS.flatMap(l=>l.concepts.map(([front,back])=>({lesson:l.title,front,back})));const card=cards[(state.runs+completedLessonCount())%cards.length];return `<section><div class="section-title"><div><h2>مرور هوشمند</h2><p>این بخش بر اساس خطاها، تست‌های ناموفق و استفاده از راهنمایی ساخته می‌شود.</p></div></div><div class="grid2"><div class="panel pad"><h3>نقاطی که باید دوباره تمرین شوند</h3>${weak.length?`<div class="lesson-list">${weak.map(w=>`<div class="card"><span class="tag warn">${w.count} بار</span><h3>${esc(w.title)}</h3><p>${esc(w.skill)}</p><div class="notice warn">${esc(w.reason)}${w.detail?' · '+esc(w.detail):''}</div></div>`).join('')}</div>`:`<div class="empty">فعلاً نقطه ضعف جدی ثبت نشده است. وقتی تمرین بیشتری انجام دهی، مرور دقیق‌تر می‌شود.</div>`}</div><div class="panel pad"><h3>فلش‌کارت مفهومی</h3><div class="card flash"><div><span class="tag">${esc(card.lesson)}</span><br><br><b dir="ltr">${esc(card.front)}</b><p>${esc(card.back)}</p></div></div><button class="btn full" onclick="state.runs++;save();render()">کارت بعدی</button><div class="notice">روش مرور: اول تعریف را با زبان خودت بگو، بعد کارت را بخوان. هدف حفظ جمله نیست؛ هدف ساخت مدل ذهنی است.</div></div></div></section>`;}
function renderProjects(){return `<section><div class="section-title"><div><h2>پروژه‌های تمرینی</h2><p>پروژه‌ها برای ترکیب مفاهیم هستند. آن‌ها را بعد از چند درس انجام بده، نه قبل از فهم مفاهیم پایه.</p></div></div><div class="grid3">${PROJECTS.map(p=>`<div class="card"><span class="tag brand">${esc(p.level)}</span><h3>${esc(p.title)}</h3><p>${esc(p.desc)}</p><ul class="bullets compact">${p.parts.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`).join('')}</div></section>`;}
function renderProfile(){return `<section><div class="section-title"><div><h2>پروفایل و کیفیت یادگیری</h2><p>این داده‌ها فقط روی همین مرورگر ذخیره می‌شوند.</p></div></div><div class="grid2"><div class="panel pad"><div class="stats"><div class="stat"><small>XP</small><b>${state.xp||0}</b></div><div class="stat"><small>سطح</small><b>${level()}</b></div><div class="stat"><small>اجراها</small><b>${state.runs||0}</b></div><div class="stat"><small>دوره</small><b>${coursePercent()}%</b></div></div><div class="notice ${studiedToday()?'ok':'warn'}">${studiedToday()?'امروز مطالعه ثبت شده است.':'امروز هنوز تمرین موفق ثبت نشده است.'}</div><div class="btnrow"><button class="btn" onclick="exportProgress()">خروجی JSON</button><button class="btn warn" onclick="resetProgress()">حذف پیشرفت</button></div></div><div class="panel pad"><h3>چرا این نسخه بهتر است؟</h3><ul class="bullets"><li>توضیح‌ها کامل‌تر و آموزشی‌تر هستند، اما صفحه شلوغ نشده است.</li><li>برای هر درس چند مثال و چهار تمرین مستقل وجود دارد.</li><li>تمرین‌ها pre-filled نیستند؛ دانش‌آموز باید فعالانه کد بسازد.</li><li>تکمیل درس به تست واقعی و بازتاب وابسته است، نه کلیک کردن.</li><li>خطاها به مرور هوشمند تبدیل می‌شوند.</li></ul></div></div></section>`;}
function exportProgress(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='python-studio-progress.json';a.click();URL.revokeObjectURL(a.href);}
function resetProgress(){if(confirm('همه پیشرفت‌ها حذف شود؟')){localStorage.removeItem(STORAGE_KEY);state=defaultState();document.documentElement.dataset.theme=state.theme;render();}}
function render(){let content;if(state.view==='learn')content=renderLearn();else if(state.view==='review')content=renderReview();else if(state.view==='projects')content=renderProjects();else if(state.view==='profile')content=renderProfile();else content=renderHome();document.getElementById('app').innerHTML=shell(content);document.documentElement.dataset.theme=state.theme||'light';}
window.setView=setView;window.selectLesson=selectLesson;window.continueLearning=continueLearning;window.toggleTheme=toggleTheme;window.setExercise=setExercise;window.codeChanged=codeChanged;window.answerPredict=answerPredict;window.showHint=showHint;window.clearEditor=clearEditor;window.runCurrent=runCurrent;window.saveReflection=saveReflection;window.completeLesson=completeLesson;window.exportProgress=exportProgress;window.resetProgress=resetProgress;window.state=state;window.render=render;
render();
})();
</script>
</body>
</html>
