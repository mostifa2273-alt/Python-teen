<!doctype html>
<html lang="fa" dir="rtl" data-theme="light">

  <meta name="theme-color" content="#f5f5f7" />
  <title>Python Academy — Apple Minimal Learning App</title>
  <style>

    body{margin:0;background:radial-gradient(circle at 50% -10%,var(--bg2),var(--bg) 44%);color:var(--text);font-family:var(--sans);line-height:1.75;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

    .mark{width:38px;height:38px;border-radius:13px;background:linear-gradient(145deg,#111,#3a3a3c);color:#fff;display:grid;place-items:center;font-weight:800;letter-spacing:-.06em;box-shadow:var(--shadowSoft)}
    [data-theme="dark"] .mark{background:linear-gradient(145deg,#f5f5f7,#8e8e93);color:#000}
    .brand-text{min-width:0}.brand h1{font-size:15px;margin:0;font-weight:750;letter-spacing:-.02em;white-space:nowrap}.brand p{font-size:12px;margin:0;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:380px}
    .seg{display:flex;align-items:center;gap:4px;background:rgba(120,120,128,.12);border:1px solid var(--line2);padding:4px;border-radius:999px;overflow:auto;scrollbar-width:none}

    .seg button.active{background:var(--cardSolid);color:var(--text);box-shadow:0 1px 6px rgba(0,0,0,.08)}
    .theme{width:36px;height:36px;border:1px solid var(--line);background:var(--card);border-radius:999px;display:grid;place-items:center}

    .eyebrow{display:inline-flex;align-items:center;gap:8px;padding:7px 12px;border-radius:999px;background:var(--blue2);color:var(--blue);font-size:13px;font-weight:700;margin-bottom:16px}

    .hero p{font-size:clamp(17px,2.4vw,22px);max-width:760px;margin:0 auto;color:var(--muted);line-height:1.55}
    .hero-actions{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:24px}
    .grid{display:grid;gap:18px}.grid.two{grid-template-columns:1fr 1fr}.grid.three{grid-template-columns:repeat(3,1fr)}
    .card{background:var(--card);border:1px solid var(--line2);box-shadow:var(--shadowSoft);border-radius:var(--radius);padding:26px;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
    .panel{background:var(--cardSolid);border:1px solid var(--line2);box-shadow:var(--shadowSoft);border-radius:var(--radius);padding:30px}
    .flat{box-shadow:none;background:transparent;border:1px solid var(--line);border-radius:var(--radius2);padding:18px}
    h3{font-size:24px;line-height:1.2;letter-spacing:-.035em;margin:0 0 10px} h4{font-size:17px;margin:0 0 8px;letter-spacing:-.01em}.muted{color:var(--muted)}.small{font-size:13px;color:var(--muted)}
    .btn{border:1px solid var(--line);background:var(--cardSolid);color:var(--text);padding:11px 16px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;gap:8px;text-decoration:none;transition:.18s ease;font-weight:650;min-height:42px}
    .btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px rgba(0,0,0,.08)}.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}.btn.ghost{background:transparent}.btn.danger{color:var(--red)}.btn:disabled{opacity:.48;cursor:not-allowed;transform:none;box-shadow:none}.full{width:100%}

    .course-list{display:grid;gap:10px}.lesson-btn{width:100%;display:grid;grid-template-columns:42px minmax(0,1fr) auto;gap:14px;align-items:center;text-align:inherit;border:1px solid var(--line2);background:var(--cardSolid);border-radius:22px;padding:14px 15px;transition:.18s ease}.lesson-btn:hover{transform:translateY(-1px);box-shadow:var(--shadowSoft)}.lesson-btn.active{border-color:color-mix(in srgb,var(--blue) 48%,transparent);box-shadow:0 0 0 4px var(--blue2)}.lesson-btn.locked{opacity:.5}.lesson-no{width:42px;height:42px;border-radius:15px;background:rgba(120,120,128,.12);display:grid;place-items:center;font-weight:800}.lesson-btn h4{font-size:15px;margin:0}.lesson-btn p{margin:2px 0 0;color:var(--muted);font-size:12px;line-height:1.45}.pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 10px;background:rgba(120,120,128,.12);color:var(--muted);font-size:12px;font-weight:650;white-space:nowrap}.pill.blue{background:var(--blue2);color:var(--blue)}.pill.green{background:var(--green2);color:var(--green)}.pill.orange{background:var(--orange2);color:var(--orange)}
    .lesson-shell{display:grid;grid-template-columns:300px minmax(0,1fr);gap:22px;align-items:start}.rail{position:sticky;top:86px}.rail .panel{padding:18px;border-radius:24px}.lesson-main{display:grid;gap:18px}.lesson-title{padding:36px;text-align:right}.lesson-title h2{font-size:clamp(34px,5vw,58px);line-height:1.08;letter-spacing:-.065em;margin:8px 0 12px}.lesson-title p{font-size:18px;color:var(--muted);line-height:1.65;max-width:850px}.stepbar{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:22px}.step{background:rgba(120,120,128,.1);border-radius:16px;padding:11px 12px;color:var(--muted);font-size:12px}.step b{display:block;color:var(--text);font-size:12px}.step.done{background:var(--green2);color:var(--green)}.step.active{background:var(--blue2);color:var(--blue)}
    .section-head{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:16px}.section-head h3{margin:0}.section-head p{margin:4px 0 0;color:var(--muted)}
    .readable{max-width:860px}.readable p{font-size:17px;color:var(--text);line-height:1.95;margin:0 0 16px}.readable .lead{font-size:20px;color:var(--muted);line-height:1.75}.concepts{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:16px}.concept{background:rgba(120,120,128,.09);border:1px solid var(--line2);border-radius:20px;padding:16px}.concept strong{display:block;margin-bottom:5px}.concept span{color:var(--muted);font-size:14px}.notes{display:grid;gap:9px;margin:0;padding:0;list-style:none}.notes li{background:rgba(120,120,128,.09);border-radius:18px;padding:13px 15px;color:var(--muted)}
    .example-list{display:grid;gap:12px}.example{border:1px solid var(--line2);border-radius:24px;background:rgba(120,120,128,.06);overflow:hidden}.example summary{padding:17px 20px;font-weight:750;cursor:pointer;list-style:none}.example summary::-webkit-details-marker{display:none}.example summary:after{content:'+';float:left;color:var(--muted);font-size:20px;line-height:1}.example[open] summary:after{content:'–'}.example-body{padding:0 20px 20px}.explain{margin:10px 0 0;color:var(--muted)}
    pre,.editor{direction:ltr;text-align:left;background:var(--code);color:var(--codeText);border:1px solid var(--line2);border-radius:20px;padding:16px;font-family:var(--mono);font-size:13px;line-height:1.65;overflow:auto}pre{margin:0}.out{white-space:pre-wrap;min-height:84px}.label{font-size:12px;color:var(--muted);margin:12px 0 6px;font-weight:700}.editor{display:block;width:100%;min-height:270px;resize:vertical;outline:none}.editor:focus{box-shadow:0 0 0 4px var(--blue2);border-color:var(--blue)}
    .predict-options{display:grid;gap:9px;margin-top:14px}.choice{border:1px solid var(--line);background:var(--cardSolid);border-radius:18px;padding:13px 15px;text-align:right;transition:.18s ease}.choice:hover{border-color:var(--blue)}.choice.ok{background:var(--green2);border-color:color-mix(in srgb,var(--green) 35%,transparent);color:var(--green)}.choice.bad{background:var(--red2);border-color:color-mix(in srgb,var(--red) 35%,transparent);color:var(--red)}
    .exercise-layout{display:grid;grid-template-columns:320px minmax(0,1fr);gap:16px}.exercise-list{display:grid;gap:8px}.exercise-tab{border:1px solid var(--line2);background:var(--cardSolid);border-radius:18px;padding:12px;text-align:right}.exercise-tab.active{box-shadow:0 0 0 4px var(--blue2);border-color:var(--blue)}.exercise-tab.done{background:var(--green2);color:var(--green)}.requirements{display:grid;gap:8px;margin-top:14px}.requirements div{background:rgba(120,120,128,.09);border-radius:15px;padding:10px 12px;color:var(--muted);font-size:13px}.feedback{margin-top:12px;border-radius:18px;padding:13px 15px;background:rgba(120,120,128,.1);color:var(--muted)}.feedback.ok{background:var(--green2);color:var(--green)}.feedback.bad{background:var(--red2);color:var(--red)}.feedback.warn{background:var(--orange2);color:var(--orange)}.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:12px}
    textarea.reflect{width:100%;min-height:120px;border:1px solid var(--line);background:var(--cardSolid);border-radius:20px;padding:15px;resize:vertical;outline:none;line-height:1.8}.reflect:focus{box-shadow:0 0 0 4px var(--blue2);border-color:var(--blue)}
    .review-card{display:grid;gap:10px}.empty{text-align:center;color:var(--muted);padding:42px 20px;background:rgba(120,120,128,.08);border-radius:24px}.footer{text-align:center;color:var(--faint);font-size:12px;padding:18px 0 34px}.toast{position:fixed;left:18px;bottom:18px;z-index:40;max-width:min(420px,calc(100vw - 36px));background:var(--cardSolid);border:1px solid var(--line);box-shadow:var(--shadow);border-radius:18px;padding:13px 15px;color:var(--text);opacity:0;transform:translateY(12px);pointer-events:none;transition:.2s}.toast.show{opacity:1;transform:translateY(0)}
    .mobile-course{display:none;margin:0 0 16px}.select{width:100%;border:1px solid var(--line);background:var(--cardSolid);border-radius:18px;padding:12px 14px;color:var(--text)}
    @media (max-width:980px){.top-inner{padding:12px 14px;gap:10px}.brand p{display:none}.seg{order:3;width:100%;justify-content:flex-start}.top-inner{flex-wrap:wrap}.container{padding:22px 14px 54px}.grid.two,.grid.three{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.lesson-shell{grid-template-columns:1fr}.rail{display:none}.mobile-course{display:block}.lesson-title{padding:26px}.stepbar{grid-template-columns:1fr 1fr}.concepts{grid-template-columns:1fr}.exercise-layout{grid-template-columns:1fr}.hero{text-align:right;margin-top:12px}.hero-actions{justify-content:flex-start}.hero h2{font-size:46px}.panel,.card{padding:22px;border-radius:24px}}
    @media (max-width:520px){.seg button{padding:7px 10px}.lesson-btn{grid-template-columns:38px minmax(0,1fr);}.lesson-btn .pill{grid-column:2}.stats{grid-template-columns:1fr 1fr}.hero h2{font-size:38px}.readable p{font-size:16px}.lesson-title h2{font-size:34px}.stepbar{grid-template-columns:1fr}.actions .btn{width:100%}}
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="top-inner">
        <div class="brand"><div class="mark">Py</div><div class="brand-text"><h1>Python Academy</h1><p>آموزش پایتون با طراحی آرام، تمرین واقعی و توضیح عمیق</p></div></div>
        <nav class="seg" aria-label="بخش‌های اصلی">
          <button data-nav="home">مسیر</button><button data-nav="learn">درس</button><button data-nav="review">مرور</button><button data-nav="projects">پروژه‌ها</button><button data-nav="profile">پروفایل</button>
        </nav>
        <button class="theme" id="themeBtn" title="تغییر تم">◐</button>
      </div>
    </header>
    <main class="container" id="app"></main>
    <div class="footer">One-file app · no build step · progress saved locally</div>
  </div>
  <div class="toast" id="toast"></div>
<script>
(() => {
'use strict';
const STORAGE='py-academy-apple-v1';
const TODAY=new Date().toISOString().slice(0,10);
const LESSONS=[
 {id:'print',title:'شروع برنامه‌نویسی: خروجی، ترتیب اجرا و فکر الگوریتمی',skill:'print، خروجی، ترتیب خط‌ها',minutes:'۴۵ تا ۶۰ دقیقه',level:'پایه',
  intro:'در اولین قدم، باید بفهمی برنامه دقیقاً چگونه با کامپیوتر صحبت می‌کند. ساده‌ترین راه برای دیدن نتیجه فکر خودت در پایتون، دستور print است. print فقط یک دستور ساده برای چاپ متن نیست؛ یک ابزار یادگیری، تست و دیباگ است. وقتی چیزی را چاپ می‌کنی، در واقع از برنامه می‌پرسی: «الان چه می‌دانی؟ چه چیزی را محاسبه کرده‌ای؟»',
  why:'بسیاری از نوجوانان برنامه‌نویسی را با حفظ کردن دستورها شروع می‌کنند، اما برنامه‌نویسی واقعی از دیدن رابطه بین دستور و نتیجه شروع می‌شود. اگر بتوانی خروجی یک برنامه کوتاه را قبل از اجرا پیش‌بینی کنی، یعنی داری مثل برنامه‌نویس فکر می‌کنی. در این درس یاد می‌گیری که پایتون خط‌ها را از بالا به پایین اجرا می‌کند و هر print یک پیام مشخص به خروجی می‌فرستد.',
  mental:'برنامه مثل یک لیست دقیق از دستورهاست. پایتون از خط اول شروع می‌کند، هر خط را انجام می‌دهد و بعد سراغ خط بعدی می‌رود. خروجی مثل دفترچه گزارش برنامه است؛ هر چیزی که با print چاپ شود، در این دفترچه ظاهر می‌شود.',
  concepts:[['print','دستوری برای نشان دادن متن، عدد یا نتیجه محاسبه در خروجی.'],['string','متن داخل کوتیشن؛ مثل "سلام" یا "Python".'],['order','ترتیب اجرا مهم است؛ خط بالا قبل از خط پایین اجرا می‌شود.'],['debugging','چاپ کردن مقدارها کمک می‌کند بفهمی برنامه چه می‌کند.']],
  examples:[
   {title:'یک پیام ساده',code:'print("سلام پایتون")',out:'سلام پایتون',explain:'متن داخل کوتیشن همان‌طور که نوشته شده چاپ می‌شود. این اولین راه ارتباط با خروجی است.'},
   {title:'چند خط خروجی',code:'print("شروع")\nprint("تمرین")\nprint("پایان")',out:'شروع\nتمرین\nپایان',explain:'پایتون خط‌ها را به ترتیب اجرا می‌کند. پس خروجی دقیقاً همان ترتیب را نشان می‌دهد.'},
   {title:'چاپ عدد و محاسبه',code:'print(10)\nprint(10 + 5)\nprint(2 * 6)',out:'10\n15\n12',explain:'برای عدد و محاسبه نیازی به کوتیشن نیست. پایتون اول محاسبه را انجام می‌دهد، بعد نتیجه را چاپ می‌کند.'},
   {title:'پیام‌های مرحله‌ای برای فهم برنامه',code:'print("مرحله 1: شروع")\nprint("مرحله 2: آماده‌سازی")\nprint("مرحله 3: پایان")',out:'مرحله 1: شروع\nمرحله 2: آماده‌سازی\nمرحله 3: پایان',explain:'این روش بعداً در دیباگ خیلی مهم می‌شود؛ با پیام‌های کوچک می‌فهمی برنامه تا کجا درست پیش رفته است.'}
  ],
  predict:{code:'print("A")\nprint("B")\nprint(3 + 4)',question:'خروجی این کد چیست؟',options:['A B 7','A\nB\n7','B\nA\n7','A\nB\n3 + 4'],answer:1,why:'هر print در خط جداگانه چاپ می‌شود و 3 + 4 قبل از چاپ محاسبه می‌شود.'},
  exercises:[
   {id:'p1',title:'معرفی سه‌خطی',goal:'از صفر کدی بنویس که نام، علاقه و هدف یادگیری تو را در سه خط جدا چاپ کند.',rules:['باید حداقل سه print داشته باشد.','خروجی باید سه خط قابل فهم داشته باشد.','از کد آماده استفاده نکن؛ خودت متن را انتخاب کن.'],expected:['پایتون'],must:['print','print','print'],hints:['سه خط جداگانه بنویس.','هر خط باید print("...") باشد.','حداقل در یکی از خطوط کلمه پایتون را بنویس.']},

 {id:'functions',title:'تابع‌ها و دیکشنری‌ها: ساخت برنامه تمیز',skill:'def، return، dict، key/value',minutes:'۸۰ تا ۹۵ دقیقه',level:'متوسط',
  intro:'وقتی برنامه بزرگ‌تر می‌شود، باید هم منطق را مرتب کنی و هم داده‌ها را معنادار نگه داری. تابع‌ها برای مرتب کردن منطق هستند؛ دیکشنری‌ها برای نگه‌داری داده‌های نام‌دار. این دو با هم باعث می‌شوند برنامه شبیه یک سیستم واقعی شود، نه چند خط پراکنده.',

  examples:[
   {title:'تابع ساده',code:'def greet(name):\n    return f"سلام {name}"\n\nprint(greet("سارا"))',out:'سلام سارا',explain:'تابع greet ورودی می‌گیرد و پیام برمی‌گرداند.'},
   {title:'تابع محاسبه XP',code:'def add_xp(current, bonus):\n    return current + bonus\n\nnew_xp = add_xp(100, 25)\nprint(new_xp)',out:'125',explain:'return نتیجه را به بیرون تابع می‌فرستد تا بتوانی ذخیره یا چاپش کنی.'},

  exercises:[

   {id:'f2',title:'محاسبه XP جدید',goal:'تابع add_xp(current, bonus) بساز که مجموع را return کند و نتیجه 150 را چاپ کن.',rules:['باید دو پارامتر داشته باشد.','خروجی باید 150 باشد.'],expected:['150'],must:['def','return','add_xp'],hints:['return current + bonus','با 100 و 50 صدا بزن.','نتیجه را print کن.']},

const PROJECTS=[
 {title:'داشبورد XP شخصی',desc:'یک برنامه بساز که نام، XP، سطح و وضعیت یادگیری را گزارش کند.',parts:['متغیرهای واضح بساز','با شرط سطح را تشخیص بده','با f-string گزارش انسانی چاپ کن']},
 {title:'برنامه تمرین هفتگی',desc:'لیست روزها و زمان تمرین را بساز و مجموع تمرین هفتگی را محاسبه کن.',parts:['از لیست استفاده کن','با for روی روزها حرکت کن','جمع دقیقه‌ها را چاپ کن']},
 {title:'پروفایل یادگیرنده',desc:'با دیکشنری و تابع یک پروفایل کوچک برای یادگیرنده بساز.',parts:['profile بساز','تابع report بنویس','خروجی تمیز چاپ کن']},
 {title:'موتور بازخورد',desc:'تابعی بنویس که بر اساس score پیام مناسب بدهد.',parts:['if/elif/else بنویس','چند score را تست کن','پیام‌ها را انسانی نگه دار']}
];
function defaults(){return{view:'home',lesson:0,exercise:{},code:{},doneExercises:{},doneLessons:{},prediction:{},reflection:{},weak:{},hints:{},attempts:{},xp:0,streak:0,lastDay:null,runs:0,theme:'light'};}
let state=load();
function load(){try{return Object.assign(defaults(),JSON.parse(localStorage.getItem(STORAGE)||'{}'))}catch{return defaults()}}
function save(){localStorage.setItem(STORAGE,JSON.stringify(state))}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function norm(s){return String(s||'').toLowerCase().replace(/[\u200c\s]+/g,' ').trim()}
function lesson(){return LESSONS[Math.max(0,Math.min(state.lesson,LESSONS.length-1))]}
function exIndex(l=lesson()){return state.exercise[l.id]||0}
function exercise(l=lesson()){return l.exercises[Math.max(0,Math.min(exIndex(l),l.exercises.length-1))]}
function key(l=lesson(),e=exercise(l)){return l.id+':'+e.id}
function isUnlocked(i){return i===0||!!state.doneLessons[LESSONS[i-1].id]}
function lessonDoneCount(l){return l.exercises.filter(e=>state.doneExercises[l.id+':'+e.id]).length}
function coursePercent(){return Math.round(Object.keys(state.doneLessons).length/LESSONS.length*100)}
function level(){return Math.floor((state.xp||0)/240)+1}
function touchDay(){if(state.lastDay!==TODAY){state.streak=state.lastDay?((Date.now()-new Date(state.lastDay).getTime())<172800000?(state.streak||0)+1:1):1;state.lastDay=TODAY}}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>t.classList.remove('show'),3000)}
function setView(v){state.view=v;save();render();window.scrollTo({top:0,behavior:'smooth'})}
function selectLesson(i){if(!isUnlocked(i)){toast('این درس هنوز قفل است. درس قبلی را با تمرین واقعی کامل کن.');return}state.lesson=i;state.view='learn';save();render();window.scrollTo({top:0,behavior:'smooth'})}
function setExercise(i){const l=lesson();state.exercise[l.id]=i;save();render()}
function stars(l){const d=state.doneLessons[l.id];return d?'★'.repeat(d.stars)+'☆'.repeat(3-d.stars):'—'}
function navState(){document.querySelectorAll('[data-nav]').forEach(b=>{b.classList.toggle('active',b.dataset.nav===state.view);b.onclick=()=>setView(b.dataset.nav)});document.documentElement.dataset.theme=state.theme||'light'}
function courseRail(){return `<div class="panel"><div class="section-head"><div><h3 style="font-size:19px">دوره</h3><p>${coursePercent()}٪ کامل شده</p></div></div><div class="progress"><i style="width:${coursePercent()}%"></i></div><br><div class="course-list">${LESSONS.map((l,i)=>{const locked=!isUnlocked(i),done=state.doneLessons[l.id],active=i===state.lesson;return `<button class="lesson-btn ${active?'active':''} ${locked?'locked':''}" onclick="selectLesson(${i})"><span class="lesson-no">${locked?'×':done?'✓':i+1}</span><span><h4>${esc(l.title)}</h4><p>${esc(l.skill)} · ${lessonDoneCount(l)}/${l.exercises.length} تمرین</p></span><span class="pill ${done?'green':''}">${done?stars(l):l.level}</span></button>`}).join('')}</div></div>`}
function home(){return `<section class="hero"><span class="eyebrow">طراحی آرام، یادگیری عمیق، تمرین واقعی</span><h2>پایتون را مثل یک مهارت واقعی یاد بگیر.</h2><p>این اپلیکیشن ظاهر شلوغ و بازی‌زدگی اضافی را حذف می‌کند. تمرکز روی توضیح کامل، مثال‌های روشن، تمرین‌های خالی، تست واقعی و بازتاب یادگیری است.</p><div class="hero-actions"><button class="btn primary" onclick="selectLesson(${state.lesson})">ادامه یادگیری</button><button class="btn" onclick="setView('review')">مرور هوشمند</button></div></section><section class="panel"><div class="stats"><div class="stat"><b>${state.xp||0}</b><span>XP</span></div><div class="stat"><b>${level()}</b><span>سطح</span></div><div class="stat"><b>${state.streak||0}</b><span>روز پیوسته</span></div><div class="stat"><b>${coursePercent()}%</b><span>تسلط دوره</span></div></div><div class="section-head"><div><h3>مسیر یادگیری</h3><p>هر درس فقط وقتی باز می‌شود که درس قبلی را با پیش‌بینی، تمرین و بازتاب کامل کرده باشی.</p></div></div><div class="course-list">${LESSONS.map((l,i)=>{const locked=!isUnlocked(i),done=state.doneLessons[l.id];return `<button class="lesson-btn ${locked?'locked':''}" onclick="selectLesson(${i})"><span class="lesson-no">${locked?'×':done?'✓':i+1}</span><span><h4>${esc(l.title)}</h4><p>${esc(l.skill)} · ${l.minutes} · ${lessonDoneCount(l)}/${l.exercises.length} تمرین کامل</p></span><span class="pill ${done?'green':locked?'':'blue'}">${done?stars(l):locked?'قفل':l.level}</span></button>`}).join('')}</div></section><br><section class="grid three"><div class="card"><h3>توضیح عمیق</h3><p class="muted">هر مفهوم با مدل ذهنی، دلیل کاربرد، مثال و خطاهای رایج توضیح داده می‌شود.</p></div><div class="card"><h3>تمرین خالی</h3><p class="muted">ادیتور تمرین از قبل پر نمی‌شود. دانش‌آموز باید خودش از صفر کد بنویسد.</p></div><div class="card"><h3>تسلط واقعی</h3><p class="muted">کامل شدن درس به تست موفق، پیش‌بینی درست و بازتاب کوتاه وابسته است.</p></div></section>`}
function mobileCourse(){return `<div class="mobile-course"><select class="select" onchange="selectLesson(Number(this.value))">${LESSONS.map((l,i)=>`<option value="${i}" ${i===state.lesson?'selected':''} ${!isUnlocked(i)?'disabled':''}>${i+1}. ${esc(l.title)}</option>`).join('')}</select></div>`}
function learn(){const l=lesson(),p=!!state.prediction[l.id],done=lessonDoneCount(l),ref=(state.reflection[l.id]||'');return `<div class="lesson-shell"><aside class="rail">${courseRail()}</aside><section class="lesson-main">${mobileCourse()}<div class="panel lesson-title"><span class="pill blue">${esc(l.level)} · ${esc(l.minutes)}</span><h2>${esc(l.title)}</h2><p>${esc(l.intro)}</p><div class="stepbar"><div class="step done"><b>۱. توضیح</b>مطالعه مفهوم</div><div class="step ${p?'done':'active'}"><b>۲. پیش‌بینی</b>${p?'کامل':'در انتظار'}</div><div class="step ${done>=3?'done':'active'}"><b>۳. تمرین</b>${done}/${l.exercises.length}</div><div class="step ${ref.trim().length>=35?'done':'active'}"><b>۴. بازتاب</b>${ref.trim().length>=35?'کامل':'در انتظار'}</div><div class="step ${state.doneLessons[l.id]?'done':'active'}"><b>۵. تسلط</b>${state.doneLessons[l.id]?'ثبت شد':'آماده‌سازی'}</div></div></div>${learnText(l)}${examples(l)}${predict(l)}${practice(l)}${reflection(l)}</section></div>`}
function learnText(l){return `<section class="panel readable"><div class="section-head"><div><h3>فهم عمیق مفهوم</h3><p>قبل از کدنویسی، اول مدل ذهنی را بساز.</p></div></div><p class="lead">${esc(l.why)}</p><p>${esc(l.mental)}</p><div class="concepts">${l.concepts.map(([a,b])=>`<div class="concept"><strong dir="ltr">${esc(a)}</strong><span>${esc(b)}</span></div>`).join('')}</div></section>`}
function examples(l){return `<section class="panel"><div class="section-head"><div><h3>مثال‌های آموزشی</h3><p>مثال‌ها برای خواندن هستند، نه کپی کردن در تمرین.</p></div><span class="pill">${l.examples.length} مثال</span></div><div class="example-list">${l.examples.map((e,i)=>`<details class="example" ${i<2?'open':''}><summary>${esc(e.title)}</summary><div class="example-body"><div class="label">کد</div><pre>${esc(e.code)}</pre><div class="label">خروجی</div><pre>${esc(e.out)}</pre><p class="explain">${esc(e.explain)}</p></div></details>`).join('')}</div></section>`}
function predict(l){const answered=state.prediction[l.id];return `<section class="panel"><div class="section-head"><div><h3>پیش‌بینی خروجی</h3><p>قبل از اجرا کردن، باید بتوانی نتیجه را حدس بزنی.</p></div>${answered?'<span class="pill green">کامل شد</span>':'<span class="pill orange">لازم</span>'}</div><pre>${esc(l.predict.code)}</pre><h4>${esc(l.predict.question)}</h4><div class="predict-options">${l.predict.options.map((o,i)=>`<button class="choice ${answered?(i===l.predict.answer?'ok':''):''}" onclick="answerPredict(${i})"><span dir="ltr">${esc(o)}</span></button>`).join('')}</div>${answered?`<div class="feedback ok">${esc(l.predict.why)}</div>`:''}</section>`}
function practice(l){const e=exercise(l),idx=exIndex(l),k=key(l,e),code=state.code[k]||'',done=!!state.doneExercises[k];return `<section class="panel"><div class="section-head"><div><h3>تمرین واقعی</h3><p>ادیتور عمداً خالی است. مثال‌ها را بفهم، اما راه‌حل تمرین را خودت بساز.</p></div><span class="pill ${lessonDoneCount(l)>=3?'green':'orange'}">${lessonDoneCount(l)}/${l.exercises.length} کامل</span></div><div class="exercise-layout"><aside class="exercise-list">${l.exercises.map((x,i)=>`<button class="exercise-tab ${i===idx?'active':''} ${state.doneExercises[l.id+':'+x.id]?'done':''}" onclick="setExercise(${i})"><strong>${i+1}. ${esc(x.title)}</strong><br><span class="small">${state.doneExercises[l.id+':'+x.id]?'کامل شده':'تمرین خالی'}</span></button>`).join('')}</aside><div><h4>${esc(e.title)}</h4><p class="muted">${esc(e.goal)}</p><div class="requirements">${e.rules.map(r=>`<div>• ${esc(r)}</div>`).join('')}</div><div class="label">کد خودت را از صفر بنویس</div><textarea id="editor" class="editor" spellcheck="false" autocomplete="off" autocapitalize="off" oninput="saveCode(this.value)" placeholder="# اینجا از صفر کد بنویس. تمرین‌ها عمداً pre-filled نیستند.\n"></textarea><div class="actions"><button class="btn primary" onclick="runCurrent(true)">اجرای تست</button><button class="btn" onclick="runCurrent(false)">فقط اجرا</button><button class="btn" onclick="showHint()">راهنمایی مرحله‌ای</button><button class="btn ghost danger" onclick="clearEditor()">خالی کردن</button></div><div id="feedback" class="feedback ${done?'ok':''}">${done?'این تمرین کامل شده است. می‌توانی تمرین بعدی را انجام دهی.':'بعد از نوشتن کد، اجرای تست را بزن.'}</div><div class="label">خروجی</div><pre id="output" class="out">${code?'کد ذخیره شده است. برای دیدن خروجی، اجرا کن.':'هنوز کدی اجرا نشده است.'}</pre></div></div></section>`}
function reflection(l){const ref=state.reflection[l.id]||'';return `<section class="panel"><div class="section-head"><div><h3>بازتاب یادگیری</h3><p>برای کامل شدن درس، یک جمله واقعی بنویس: چه فهمیدی، کجا اشتباه کردی، یا دفعه بعد چه بهتر می‌کنی؟</p></div></div><textarea class="reflect" placeholder="مثلاً: فهمیدم که پایتون خط‌ها را به ترتیب اجرا می‌کند و برای دیدن مقدارها می‌توانم از print استفاده کنم." oninput="saveReflection(this.value)">${esc(ref)}</textarea><div class="actions"><button class="btn primary" onclick="completeLesson()">تکمیل درس و باز کردن مرحله بعد</button><span class="pill">حداقل ۳۵ کاراکتر</span></div></section>`}
function review(){const weak=Object.values(state.weak||{});const cards=LESSONS.flatMap(l=>l.concepts.map(c=>({lesson:l.title,front:c[0],back:c[1]})));const card=cards[(state.runs+Object.keys(state.doneExercises).length)%cards.length];return `<section class="hero" style="margin-top:10px"><span class="eyebrow">Review</span><h2>مرور بدون شلوغی.</h2><p>وقتی تست‌ها شکست بخورند یا راهنمایی زیاد استفاده شود، این بخش به‌صورت خودکار نقاط ضعف را نشان می‌دهد.</p></section><section class="grid two"><div class="panel"><h3>نقاط نیازمند تمرین</h3>${weak.length?`<div class="review-card">${weak.map(w=>`<div class="flat"><span class="pill orange">${w.count} بار</span><h4>${esc(w.title)}</h4><p class="muted">${esc(w.reason)} ${w.detail?'· '+esc(w.detail):''}</p></div>`).join('')}</div>`:'<div class="empty">فعلاً نقطه ضعف مشخصی ثبت نشده است. چند تمرین انجام بده تا مرور دقیق‌تر شود.</div>'}</div><div class="panel"><h3>فلش‌کارت مفهومی</h3><div class="flat"><span class="pill blue">${esc(card.lesson)}</span><h3 dir="ltr">${esc(card.front)}</h3><p class="muted">${esc(card.back)}</p></div><button class="btn full" onclick="state.runs++;save();render()">کارت بعدی</button></div></section>`}
function projects(){return `<section class="hero" style="margin-top:10px"><span class="eyebrow">Projects</span><h2>پروژه‌ها بعد از فهم.</h2><p>این پروژه‌ها برای ترکیب مفاهیم هستند. اول درس‌ها را کامل کن، بعد با پروژه‌ها مهارت را واقعی کن.</p></section><section class="grid two">${PROJECTS.map(p=>`<div class="panel"><h3>${esc(p.title)}</h3><p class="muted">${esc(p.desc)}</p><ul class="notes">${p.parts.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`).join('')}</section>`}
function profile(){return `<section class="hero" style="margin-top:10px"><span class="eyebrow">Profile</span><h2>کیفیت یادگیری، نه فقط امتیاز.</h2><p>اطلاعات پیشرفت فقط در همین مرورگر ذخیره می‌شود. می‌توانی آن را خروجی بگیری یا پاک کنی.</p></section><section class="panel"><div class="stats"><div class="stat"><b>${state.xp||0}</b><span>XP</span></div><div class="stat"><b>${level()}</b><span>سطح</span></div><div class="stat"><b>${state.runs||0}</b><span>اجراها</span></div><div class="stat"><b>${Object.keys(state.doneExercises).length}</b><span>تمرین کامل</span></div></div><div class="actions"><button class="btn" onclick="exportProgress()">خروجی JSON</button><button class="btn danger" onclick="resetProgress()">حذف پیشرفت</button></div></section>`}
function answerPredict(i){const l=lesson();if(i===l.predict.answer){state.prediction[l.id]=true;state.xp+=state.prediction[l.id]?0:15;save();render();toast('درست بود. حالا وقت تمرین است.')}else{state.weak[l.id]={title:l.title,reason:'پیش‌بینی خروجی نادرست',detail:l.predict.why,count:((state.weak[l.id]||{}).count||0)+1};save();toast('هنوز نه. توضیح مثال‌ها را دوباره بخوان و دوباره فکر کن.')}}
function saveCode(v){const l=lesson(),e=exercise(l);state.code[key(l,e)]=v;save()}
function saveReflection(v){const l=lesson();state.reflection[l.id]=v;save()}
function showHint(){const l=lesson(),e=exercise(l),k=key(l,e);const n=state.hints[k]||0;state.hints[k]=n+1;state.weak[l.id]={title:l.title,reason:'استفاده از راهنمایی',detail:e.title,count:((state.weak[l.id]||{}).count||0)+1};save();feedback('راهنمایی: '+e.hints[Math.min(n,e.hints.length-1)],'warn')}
function clearEditor(){const ed=document.getElementById('editor');if(ed){ed.value='';saveCode('')}feedback('ادیتور خالی شد. دوباره از صفر شروع کن.','warn')}
function feedback(msg,type=''){const f=document.getElementById('feedback');if(f){f.className='feedback '+type;f.textContent=msg}}
function output(msg){const o=document.getElementById('output');if(o)o.textContent=msg}
function friendly(err){const m=String(err||'');if(m.includes('SyntaxError'))return 'خطای ساختار: احتمالاً کوتیشن، پرانتز، دو نقطه یا ترتیب نوشتن مشکل دارد.';if(m.includes('NameError'))return 'NameError: نام یک متغیر یا تابع اشتباه نوشته شده یا هنوز ساخته نشده است.';if(m.includes('IndentationError'))return 'IndentationError: تورفتگی داخل if، for یا def را بررسی کن.';if(m.includes('TypeError'))return 'TypeError: نوع داده برای این عملیات مناسب نیست؛ شاید متن و عدد را قاطی کرده‌ای.';return 'کد اجرا نشد. پیام فنی: '+m.slice(0,220)}
let worker=null,busy=false,runId=0;
function workerCode(){return `let ready=(async()=>{importScripts('https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js');self.pyodide=await loadPyodide({indexURL:'https://cdn.jsdelivr.net/pyodide/v0.26.4/full/'});})();self.onmessage=async(e)=>{const id=e.data.id;let out='';let err='';try{await ready;pyodide.setStdout({batched:s=>out+=s+'\\n'});pyodide.setStderr({batched:s=>err+=s+'\\n'});await pyodide.runPythonAsync(e.data.code);self.postMessage({id,ok:true,out,err});}catch(ex){self.postMessage({id,ok:false,out,err,error:String(ex)});}}`}
function ensureWorker(){if(worker)return worker;worker=new Worker(URL.createObjectURL(new Blob([workerCode()],{type:'application/javascript'})));return worker}
function runPython(code){return new Promise((resolve,reject)=>{if(busy)return reject(new Error('اجرای قبلی هنوز تمام نشده است.'));busy=true;const w=ensureWorker(),id=++runId;const timer=setTimeout(()=>{try{w.terminate()}catch{}worker=null;busy=false;reject(new Error('Timeout: اجرای کد متوقف شد.'))},8000);w.onmessage=e=>{if(e.data.id!==id)return;clearTimeout(timer);busy=false;e.data.ok?resolve((e.data.out||'')+(e.data.err?'\n'+e.data.err:'')):reject(new Error(e.data.error||'خطای نامشخص'))};w.onerror=e=>{clearTimeout(timer);busy=false;reject(new Error(e.message||'خطای بارگذاری Python'))};w.postMessage({id,code})})}
async function runCurrent(test){const ed=document.getElementById('editor'),code=(ed?.value||'').trimEnd(),l=lesson(),e=exercise(l),k=key(l,e);state.code[k]=code;state.runs++;state.attempts[k]=(state.attempts[k]||0)+1;save();if(!code.trim()){feedback('تمرین‌ها از قبل پر نمی‌شوند. باید خودت کد را از صفر بنویسی.','warn');output('');return}feedback('در حال اجرای Python... بار اول ممکن است چند ثانیه طول بکشد.');output('Loading Python...');try{const out=await runPython(code);output(out||'(بدون خروجی)');test?grade(l,e,code,out):feedback('کد اجرا شد. برای ثبت تمرین، اجرای تست را بزن.','ok')}catch(err){state.weak[l.id]={title:l.title,reason:'خطای اجرا',detail:String(err.message||err).slice(0,160),count:((state.weak[l.id]||{}).count||0)+1};save();output(String(err.message||err));feedback(friendly(err.message||err),'bad')}}
function grade(l,e,code,out){const nout=norm(out);let problems=[];e.expected.forEach(x=>{if(!nout.includes(norm(x)))problems.push('خروجی باید شامل «'+x+'» باشد.')});e.must.forEach(x=>{if(!String(code).includes(x))problems.push('در کد باید از «'+x+'» استفاده شود.')});if(problems.length){state.weak[l.id]={title:l.title,reason:'تست ناموفق',detail:problems[0],count:((state.weak[l.id]||{}).count||0)+1};save();feedback('هنوز کامل نیست: '+problems.slice(0,2).join(' '),'bad');return}if(!state.doneExercises[key(l,e)]){state.doneExercises[key(l,e)]={at:Date.now(),attempts:state.attempts[key(l,e)]||1,hints:state.hints[key(l,e)]||0};state.xp+=35;touchDay()}delete state.weak[l.id];save();feedback('عالی. تمرین ثبت شد. می‌توانی تمرین بعدی را انجام بدهی.','ok');setTimeout(render,700)}
function completeLesson(){const l=lesson(),done=lessonDoneCount(l),ref=(state.reflection[l.id]||'').trim();if(!state.prediction[l.id])return toast('اول پیش‌بینی خروجی را کامل کن.');if(done<3)return toast('برای تکمیل درس حداقل سه تمرین باید تست موفق بگیرند.');if(ref.length<35)return toast('بازتاب باید یک جمله واقعی و حداقل ۳۵ کاراکتر باشد.');const totalHints=l.exercises.reduce((a,e)=>a+(state.hints[l.id+':'+e.id]||0),0);const s=done===l.exercises.length&&totalHints<=3?3:done>=3&&totalHints<=6?2:1;if(!state.doneLessons[l.id]){state.doneLessons[l.id]={at:Date.now(),stars:s};state.xp+=s*45;touchDay()}if(state.lesson<LESSONS.length-1)state.lesson++;state.view='home';save();render();toast('درس کامل شد. مرحله بعد باز شد.')}
function exportProgress(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='python-academy-progress.json';a.click();URL.revokeObjectURL(a.href)}
function resetProgress(){if(confirm('همه پیشرفت‌ها حذف شود؟')){localStorage.removeItem(STORAGE);state=defaults();render()}}
function render(){let html=state.view==='learn'?learn():state.view==='review'?review():state.view==='projects'?projects():state.view==='profile'?profile():home();document.getElementById('app').innerHTML=html;navState();const ed=document.getElementById('editor');if(ed){const l=lesson(),e=exercise(l);ed.value=state.code[key(l,e)]||''}}
window.setView=setView;window.selectLesson=selectLesson;window.setExercise=setExercise;window.answerPredict=answerPredict;window.saveCode=saveCode;window.saveReflection=saveReflection;window.showHint=showHint;window.clearEditor=clearEditor;window.runCurrent=runCurrent;window.completeLesson=completeLesson;window.exportProgress=exportProgress;window.resetProgress=resetProgress;window.state=state;window.render=render;document.getElementById('themeBtn').onclick=()=>{state.theme=state.theme==='dark'?'light':'dark';save();navState()};render();
})();
</script>
</body>
