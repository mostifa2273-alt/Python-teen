(--text);border-radius:22px;padding:16px;text-align:right;font-weight:900}.choice.ok{border-color:rgba(24,160,88,.50);background:rgba(24,160,88,.10)}.choice.no{border-color:rgba(220,38,38,.45);background:rgba(220,38,38,.08)}.mission{border:1px solid var(--line);background:var(--solid);border-radius:26px;padding:16px}.mission h3{font-size:23px;line-height:1.2;margin:0 0 6px;letter-spacing:-.04em}.mission p{margin:0;color:var(--muted)}.reqs{display:grid;gap:8px;margin-top:12px}.req{background:var(--soft);border-radius:18px;padding:10px;display:flex;gap:8px}.req span{color:var(--good);font-weight:1000}.editor{width:100%;min-height:240px;border:1px solid var(--line);border-radius:26px;background:#101114;color:#f7f7fb;padding:16px;resize:vertical;direction:ltr;text-align:left;font:14px/1.6 "SF Mono",Consolas,monospace;outline:none}.editor:focus{border-color:var(--brand);box-shadow:0 0 0 4px rgba(0,122,255,.13)}.feedback{border-radius:22px;padding:14px}.feedback.good{background:rgba(24,160,88,.12)}.feedback.bad{background:rgba(220,38,38,.10)}.feedback.warn{background:rgba(245,158,11,.13)}.repair{border:1px solid rgba(245,158,11,.35);background:rgba(245,158,11,.10);border-radius:24px;padding:14px}.repair h3{margin:0 0 8px}.repairBtns{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.repairBtns button{border:1px solid var(--line);background:var(--solid);color:var(--text);border-radius:18px;padding:12px;font-weight:900}.projectGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.project{border:1px solid var(--line);background:var(--solid);border-radius:26px;padding:16px}.project h3{margin:0 0 6px}.project p,.project li{color:var(--muted)}.project ul{margin:10px 0 0;padding-right:18px}.reviewList{display:grid;gap:10px}.empty{text-align:center;color:var(--muted);padding:32px}.textareaSmall{width:100%;min-height:120px;border:1px solid var(--line);background:var(--solid);color:var(--text);border-radius:24px;padding:14px;resize:vertical;outline:none}.toast{position:fixed;left:50%;bottom:calc(88px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(30px);opacity:0;pointer-events:none;background:var(--text);color:var(--bg);border-radius:999px;padding:12px 16px;font-weight:900;z-index:90;box-shadow:var(--shadow);transition:.25s}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.modal{position:fixed;inset:0;background:rgba(0,0,0,.34);z-index:80;display:none;place-items:end center;padding:14px}.modal.show{display:grid}.sheet{width:min(680px,100%);background:var(--card);border:1px solid var(--line);border-radius:30px;padding:22px;box-shadow:var(--shadow);backdrop-filter:blur(24px)}.sheet h2{margin:0 0 8px;font-size:28px;letter-spacing:-.05em}.sheet p{color:var(--muted)}.bottomNav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:blur(22px);border-top:1px solid var(--line);padding:8px 10px calc(8px + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.tab{border:0;background:transparent;color:var(--muted);border-radius:18px;padding:7px 4px;display:grid;place-items:center;gap:2px;font-size:11px}.tab b{font-size:20px;line-height:1}.tab.active{background:var(--text);color:var(--bg)}.confetti{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden}.piece{position:absolute;top:-20px;width:9px;height:14px;border-radius:4px;background:var(--brand);animation:fall 850ms ease-in forwards}.piece:nth-child(2n){background:var(--brand2)}.piece:nth-child(3n){background:#34c759}.piece:nth-child(4n){background:#ffcc00}@keyframes fall{to{transform:translateY(105vh) rotate(600deg);opacity:0}}

<body>
  <div class="confetti" id="confetti"></div>
  <div class="toast" id="toast"></div>
  <div class="app">
    <header class="top">
      <div class="topin">
        <div class="brand" role="banner">
          <div class="logo">Py</div>
          <div><h1>پایتونکده نوجوان</h1><p id="topSubtitle">هر بار فقط یک قدم کوچک</p></div>
        </div>
        <div class="tools" aria-label="ابزارها">
          <button class="icon" id="calmBtn" title="حالت آرام">◌</button>
          <button class="icon" id="themeBtn" title="روشن/تاریک">◐</button>
          <button class="pill" id="rescueBtn" title="راهنمای فوری">🛟 <span>گیج شدم</span></button>
        </div>
      </div>
      <div class="thin" aria-hidden="true"><span id="topProgress"></span></div>
    </header>

    <main>
      <section id="home" class="screen active"></section>
      <section id="learn" class="screen"></section>
      <section id="review" class="screen"></section>
      <section id="projects" class="screen"></section>
    </main>
  </div>

  <nav class="bottomNav" aria-label="ناوبری اصلی">
    <button class="tab active" data-route="home"><b>⌂</b>خانه</button>
    <button class="tab" data-route="learn"><b>▶</b>ادامه</button>
    <button class="tab" data-route="review"><b>↻</b>مرور</button>
    <button class="tab" data-route="projects"><b>◇</b>چالش‌ها</button>
  </nav>

  <div class="modal" id="breakModal" aria-hidden="true">
    <div class="sheet">
      <h2>۲۰ ثانیه مکث قهرمانانه</h2>
      <p>چشم‌ها را از صفحه بردار. شانه‌ها را یک بار بالا ببر و رها کن. بعد برگرد و فقط همان یک خط بعدی را بنویس.</p>
      <div class="row"><button class="btn" id="doneBreak">برگشتم</button><button class="btn soft" id="skipBreak">بعداً</button></div>
    </div>
  </div>

  <script>
  const STORE_KEY = 'pythonteen_ultra_quality_v1';
  const STEPS = ['داستان', 'نکته', 'نمونه', 'حدس', 'تمرین', 'چالش', 'جمع‌بندی'];
  const STEP_KEYS = ['hook','cards','example','predict','practice','project','recap'];
  const LESSONS = [
    {id:'print', icon:'✨', title:'چاپ پیام', skill:'خروجی', hook:'یک ربات کوچک داری که فقط وقتی پیام درست ببیند روشن می‌شود.', goal:'اولین دستور پایتون را بنویس و خروجی بگیر.', story:'در پایتون، دستور print مثل بلندگو است: هر چیزی داخل پرانتز بگذاری، روی صفحه نشان داده می‌شود.', cards:[
      {h:'print یعنی نشان بده', t:'وقتی می‌خواهی برنامه با کاربر حرف بزند، از print استفاده می‌کنی.'},
      {h:'متن داخل گیومه می‌آید', t:'برای پیام‌های متنی، جمله را داخل " " یا \' \' می‌نویسیم.'},
      {h:'پرانتز را فراموش نکن', t:'print بدون پرانتز مثل بلندگویی است که سیمش وصل نیست.'}
    ], examples:[
      {title:'سلام ساده', code:'print("سلام")', output:'سلام', why:'متن داخل گیومه همان‌طور چاپ شد.'},
      {title:'دو خط پیام', code:'print("شروع")\nprint("آماده‌ای؟")', output:'شروع\nآماده‌ای؟', why:'هر print در یک خط جدا خروجی می‌دهد.'},
      {title:'عدد هم چاپ می‌شود', code:'print(7)', output:'7', why:'برای عدد نیازی به گیومه نیست.'}
    ], predict:{code:'print("ربات روشن شد")', choices:['ربات روشن شد','print','هیچ چیز'], answer:0, why:'print متن داخل گیومه را نمایش می‌دهد.'}, exercises:[
      {id:'p1', title:'روشن کردن ربات', ask:'دقیقاً این پیام را چاپ کن: ربات روشن شد', target:'ربات روشن شد', checks:[['exact','ربات روشن شد']], hints:['از print استفاده کن.','متن باید داخل گیومه باشد.']},
      {id:'p2', title:'دو پیام پشت سر هم', ask:'در دو خط جدا چاپ کن: شروع و بعد برو', target:'شروع\nبرو', checks:[['exact','شروع\nبرو'],['linesMin',2]], hints:['دو دستور print لازم داری.','هر پیام داخل گیومه خودش باشد.']},
      {id:'p3', title:'عدد رمز', ask:'عدد 404 را چاپ کن.', target:'404', checks:[['exact','404']], hints:['برای عدد گیومه لازم نیست.','print(404) همان خروجی را می‌دهد.']},
      {id:'p4', title:'پیام فارسی', ask:'این جمله را چاپ کن: من پایتون را شروع کردم', target:'من پایتون را شروع کردم', checks:[['exact','من پایتون را شروع کردم']], hints:['متن طولانی هم داخل گیومه می‌آید.','حروف باید دقیق باشند.']}
    ], project:{title:'تابلوی شروع بازی', brief:'یک صفحه شروع خیلی کوتاه برای بازی خیالی بساز.', steps:['نام بازی را چاپ کن.','یک پیام خوشامد بگو.','یک عدد مرحله یا امتیاز اولیه نشان بده.'], checks:[['code','print'],['linesMin',3]]}},

    {id:'vars', icon:'🎒', title:'متغیرها', skill:'حافظه برنامه', hook:'قهرمان بازی باید اسم، سکه و امتیازش را نگه دارد.', goal:'یاد بگیر داده را در یک اسم ذخیره کنی.', story:'متغیر مثل یک جعبه برچسب‌دار است. چیزی را داخلش می‌گذاری و بعد با اسم همان جعبه از آن استفاده می‌کنی.', cards:[
      {h:'متغیر اسم دارد', t:'name = "مینا" یعنی متن مینا داخل جعبه‌ای به نام name ذخیره شد.'},
      {h:'عدد هم ذخیره می‌شود', t:'coins = 5 یعنی مقدار عددی ۵ را برای بعد نگه داشتیم.'},
      {h:'اول ذخیره، بعد استفاده', t:'اگر قبل از ساخت متغیر از آن استفاده کنی، پایتون نمی‌داند منظورت چیست.'}
    ], examples:[
      {title:'نام بازیکن', code:'name = "مینا"\nprint(name)', output:'مینا', why:'print مقدار داخل name را نشان داد.'},
      {title:'سکه‌ها', code:'coins = 5\nprint(coins)', output:'5', why:'عدد ذخیره شد و بعد چاپ شد.'},
      {title:'ترکیب پیام', code:'name = "آرش"\nprint("سلام " + name)', output:'سلام آرش', why:'متن ثابت با مقدار متغیر چسبانده شد.'}
    ], predict:{code:'score = 10\nprint(score)', choices:['score','10','هیچ چیز'], answer:1, why:'وقتی score را چاپ می‌کنیم، مقدار داخل آن چاپ می‌شود.'}, exercises:[
      {id:'v1', title:'اسم قهرمان', ask:'متغیری به نام name بساز که مقدارش «سارا» باشد و آن را چاپ کن.', target:'سارا', checks:[['exact','سارا'],['code','name']], hints:['اول name = "سارا" بنویس.','بعد print(name) را اضافه کن.']},
      {id:'v2', title:'سکه شروع', ask:'متغیر coins را برابر 12 قرار بده و چاپ کن.', target:'12', checks:[['exact','12'],['code','coins']], hints:['عدد بدون گیومه نوشته می‌شود.','coins = 12']},

  const defaultState = () => ({route:'home', lesson:0, stage:0, card:0, example:0, exercise:0, passed:{}, completed:{}, drafts:{}, projectDrafts:{}, predict:{}, reflections:{}, stars:0, streak:1, lastDay:'', hints:0, attempts:0, calm:false, theme:'light', big:false, lastFeedback:''});
  let state = loadState();
  let pyWorker = null;
  let runId = 0;

  function loadState(){try{return {...defaultState(), ...(JSON.parse(localStorage.getItem(STORE_KEY)||'{}'))}}catch(e){return defaultState()}}
  function save(){localStorage.setItem(STORE_KEY, JSON.stringify(state));}
  function $(id){return document.getElementById(id)}
  function esc(s){return String(s ?? '').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
  function norm(s){return String(s ?? '').replace(/\r/g,'').split('\n').map(x=>x.trimEnd()).join('\n').trim()}
  function lesson(){return LESSONS[state.lesson] || LESSONS[0]}
  function stageKey(){return STEP_KEYS[state.stage]}
  function progressPct(){return Math.round(((state.lesson + state.stage / STEP_KEYS.length) / LESSONS.length)*100)}
  function passedIds(l=lesson()){return Object.keys(state.passed).filter(k=>k.startsWith(l.id+':'))}
  function doneCount(){return Object.keys(state.completed).length}
  function routeTo(name){state.route = name; save(); render(); window.location.hash = name;}
  function toast(msg){const el=$('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),1800)}
  function celebrate(){const c=$('confetti'); c.innerHTML=''; for(let i=0;i<28;i++){const p=document.createElement('span'); p.className='piece'; p.style.left=Math.random()*100+'%'; p.style.animationDelay=(Math.random()*180)+'ms'; p.style.transform='rotate('+Math.random()*260+'deg)'; c.appendChild(p)} setTimeout(()=>c.innerHTML='',1200)}
  function today(){return new Date().toISOString().slice(0,10)}
  function touchStreak(){const t=today(); if(state.lastDay!==t){state.streak = state.lastDay ? state.streak + 1 : 1; state.lastDay=t;}}

  function lessonRow(x,i){const locked = i > doneCount(); const current = i===state.lesson; return `<button class="lesson ${locked?'locked':''}" ${locked?'disabled':''} onclick="selectLesson(${i})"><div class="lessonIcon">${x.icon}</div><div><h3>${x.title}</h3><p>${x.hook}</p><div class="chips"><span class="chip">${x.skill}</span><span class="chip">${x.exercises.length} تمرین</span><span class="chip">چالش پایانی</span></div></div><span class="btn ${current?'':'soft'}">${state.completed[x.id]?'مرور':current?'ادامه':'شروع'}</span></button>`}

    const k=stageKey();

    if(k==='cards'){const c=l.cards[state.card]||l.cards[0]; return `<div class="phase"><span class="eyebrow">نکته ${state.card+1} از ${l.cards.length}</span><h2>${c.h}</h2><p class="explain">${c.t}</p><div class="tinycard"><h3>به زبان ساده</h3><p>${l.story}</p></div><button class="btn big" onclick="nextCard()">${state.card<l.cards.length-1?'نکته بعدی':'دیدن نمونه'}</button></div>`}
    if(k==='example'){const e=l.examples[state.example]||l.examples[0]; return `<div class="phase compact"><span class="eyebrow">نمونه ${state.example+1} از ${l.examples.length}</span><h2>${e.title}</h2><div class="code">${esc(e.code)}</div><div class="out">${esc(e.output)}</div><div class="hintLine"><span>💡</span><div><b>چرا این خروجی آمد؟</b><p class="mini">${e.why}</p></div></div><button class="btn big" onclick="nextExample()">${state.example<l.examples.length-1?'نمونه بعدی':'حدس بزن'}</button></div>`}
    if(k==='predict'){const p=l.predict; const picked = state.predict[l.id]; return `<div class="phase"><span class="eyebrow">قبل از کدنویسی</span><h2>به نظرت خروجی چیست؟</h2><div class="code">${esc(p.code)}</div><div class="choiceGrid">${p.choices.map((ch,i)=>`<button class="choice ${picked===i && i===p.answer?'ok':picked===i?'no':''}" onclick="pickPredict(${i})">${esc(ch)}</button>`).join('')}</div>${picked!==undefined?`<div class="feedback ${picked===p.answer?'good':'bad'}"><b>${picked===p.answer?'درست حدس زدی.':'نزدیک بود، اما هنوز نه.'}</b><br>${p.why}</div>`:''}<button class="btn big" ${picked===p.answer?'':'disabled'} onclick="nextStage()">رفتن به تمرین</button></div>`}
    if(k==='practice') return practiceHtml(l);
    if(k==='project') return projectHtml(l);
    return recapHtml(l);
  }
  function practiceHtml(l){const ex=l.exercises[state.exercise]||l.exercises[0]; const key=draftKey(l,ex); const draft=state.drafts[key]||''; const passed=!!state.passed[key]; const count=passedIds(l).length; return `<div class="phase compact"><span class="eyebrow">تمرین ${state.exercise+1} از ${l.exercises.length} · ${count}/2 لازم</span><div class="mission"><h3>${ex.title}</h3><p>${ex.ask}</p><div class="reqs"><div class="req"><span>✓</span><div>جعبه کدنویسی عمداً خالی است. خودت از صفر بنویس.</div></div><div class="req"><span>✓</span><div>خروجی مورد انتظار: <b>${esc(ex.target).replace(/\n/g,' / ')}</b></div></div></div></div><textarea class="editor" id="codeBox" spellcheck="false" autocomplete="off" autocapitalize="off" placeholder="اینجا کدت را از صفر بنویس..." oninput="saveDraft('${key}')">${esc(draft)}</textarea><div class="row"><button class="btn" id="runBtn" onclick="runExercise()">اجرای کد و بررسی</button><button class="btn soft" onclick="showHint()">یک راهنمای کوچک</button><button class="btn ghost" onclick="clearEditor('${key}')">پاک کردن</button></div><div class="out" id="outputBox">خروجی اینجا می‌آید.</div><div id="feedbackBox">${passed?`<div class="feedback good"><b>این تمرین قبول شده.</b> حالا می‌توانی تمرین بعدی را انجام بدهی.</div>`:''}</div><div id="repairBox"></div><button class="btn big good" ${count>=2?'':'disabled'} onclick="nextStage()">رفتن به چالش پایانی</button></div>`}
  function projectHtml(l){const key='project:'+l.id; const draft=state.projectDrafts[key]||''; return `<div class="phase compact"><span class="eyebrow">چالش پایانی</span><div class="mission"><h3>${l.project.title}</h3><p>${l.project.brief}</p><div class="reqs">${l.project.steps.map(s=>`<div class="req"><span>•</span><div>${esc(s)}</div></div>`).join('')}</div></div><textarea class="editor" id="projectBox" spellcheck="false" autocomplete="off" placeholder="چالش را با کد خودت بساز..." oninput="saveProjectDraft('${key}')">${esc(draft)}</textarea><div class="row"><button class="btn" onclick="runProject()">اجرای چالش</button><button class="btn soft" onclick="projectHint()">راهنمای کوچک</button></div><div class="out" id="projectOut">خروجی چالش اینجا می‌آید.</div><div id="projectFeedback"></div><button class="btn big good" id="finishProjectBtn" disabled onclick="nextStage()">رفتن به جمع‌بندی</button></div>`}
  function recapHtml(l){const txt=state.reflections[l.id]||''; return `<div class="phase"><span class="eyebrow">جمع‌بندی کوتاه</span><h2>یک جمله کافی است.</h2><p class="explain">بنویس این درس به چه درد می‌خورد. لازم نیست طولانی باشد؛ فقط مغزت را مجبور می‌کند مسیر را ببندد.</p><textarea class="textareaSmall" id="reflectionBox" placeholder="مثلاً: با حلقه می‌توانم کارهای تکراری را کوتاه کنم." oninput="saveReflection('${l.id}', this.value)">${esc(txt)}</textarea><button class="btn big good" onclick="finishLesson()">ثبت و رفتن به درس بعدی</button></div>`}

  function nextActionText(){const s=STEPS[state.stage]; if(state.route==='learn') return s+' را انجام بده'; return 'ادامه از '+lesson().title;}
  function nextStage(){ if(state.stage < STEP_KEYS.length-1){state.stage++; state.card=0; state.example=0; save(); render(); window.scrollTo({top:0, behavior:'smooth'});} }
  function nextCard(){const l=lesson(); if(state.card<l.cards.length-1){state.card++;} else {state.stage++; state.card=0;} save(); render();}
  function nextExample(){const l=lesson(); if(state.example<l.examples.length-1){state.example++;} else {state.stage++; state.example=0;} save(); render();}
  function pickPredict(i){const l=lesson(); state.predict[l.id]=i; if(i===l.predict.answer){addStars(1); toast('حدس درست بود.');} else {state.attempts++; toast('اشکالی ندارد؛ دوباره نگاه کن.'); maybeBreak();} save(); render();}
  function saveDraft(key){state.drafts[key]=$('codeBox').value; save();}
  function saveProjectDraft(key){state.projectDrafts[key]=$('projectBox').value; save();}
  function clearEditor(key){state.drafts[key]=''; save(); render();}
  function draftKey(l,ex){return l.id+':'+ex.id}

  function createWorker(){
    const workerCode = `let pyodideReady=null;let pyodide=null;async function boot(){importScripts('https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js');pyodide=await loadPyodide();return pyodide}self.onmessage=async(e)=>{const {id,code}=e.data;try{if(!pyodideReady) pyodideReady=boot();await pyodideReady;let out=[];let err=[];pyodide.setStdout({batched:(s)=>out.push(s)});pyodide.setStderr({batched:(s)=>err.push(s)});await pyodide.runPythonAsync(code);self.postMessage({id,ok:true,output:out.join('\\n'),error:err.join('\\n')});}catch(error){self.postMessage({id,ok:false,output:'',error:String(error&&error.message?error.message:error)});}}`;
    return new Worker(URL.createObjectURL(new Blob([workerCode], {type:'application/javascript'})));
  }
  function runPython(code){
    if(!pyWorker) pyWorker=createWorker();
    const id=++runId;
    return new Promise((resolve)=>{
      const timer=setTimeout(()=>{try{pyWorker.terminate()}catch(e){} pyWorker=null; resolve({ok:false, output:'', error:'timeout'});}, 6500);
      function handler(e){if(e.data.id!==id) return; clearTimeout(timer); pyWorker.removeEventListener('message', handler); resolve(e.data)}
      pyWorker.addEventListener('message', handler);
      pyWorker.postMessage({id, code});
    });
  }
  async function runExercise(){
    const l=lesson(); const ex=l.exercises[state.exercise]||l.exercises[0]; const key=draftKey(l,ex); const code=$('codeBox').value.trim(); state.drafts[key]=code; state.attempts++;
    if(!code){setFeedback('bad','جعبه هنوز خالی است. فقط یک خط کوچک شروع کن.'); save(); return;}
    $('runBtn').disabled=true; $('outputBox').textContent='در حال آماده‌سازی پایتون...'; $('feedbackBox').innerHTML=''; $('repairBox').innerHTML='';
    const res=await runPython(code); $('runBtn').disabled=false; const out=norm(res.output); $('outputBox').textContent=res.ok ? (res.output || 'بدون خروجی') : cleanError(res.error);
    if(!res.ok){setFeedback('bad', friendlyError(res.error)); repairPanel(ex); save(); maybeBreak(); return;}
    const check = checkAll(ex.checks, code, out);
    if(check.ok){state.passed[key]=true; addStars(3); celebrate(); toast('تمرین قبول شد.'); state.exercise = Math.min(state.exercise+1, l.exercises.length-1); save(); render();}
    else {setFeedback('warn', check.msg); repairPanel(ex); save(); maybeBreak();}
  }
  function setFeedback(kind,msg){$('feedbackBox').innerHTML=`<div class="feedback ${kind}"><b>${kind==='good'?'عالی.':kind==='bad'?'مشکل کوچک داریم.':'تقریباً درست است.'}</b><br>${esc(msg)}</div>`}
  function checkAll(checks, code, out){for(const c of checks){const [type,val]=c; if(type==='exact' && norm(val)!==out) return {ok:false,msg:'خروجی هنوز دقیقاً همان چیزی نیست که خواسته شده. فاصله، خط جدید و متن را بررسی کن.'}; if(type==='code' && !code.includes(val)) return {ok:false,msg:`در کد باید از «${val}» استفاده شود.`}; if(type==='linesMin' && out.split('\n').filter(Boolean).length < val) return {ok:false,msg:`خروجی باید دست‌کم ${val} خط داشته باشد.`};} return {ok:true,msg:'قبول شد'};}
  function friendlyError(err){const e=String(err||''); if(e==='timeout') return 'برنامه خیلی طول کشید. احتمالاً حلقه بی‌پایان ساخته‌ای. فعلاً کد را کوتاه‌تر کن.'; if(e.includes('SyntaxError')) return 'شکل نوشتن کد درست نیست. پرانتز، گیومه یا دو نقطه را بررسی کن.'; if(e.includes('IndentationError')) return 'تورفتگی خط‌ها درست نیست. خط‌های داخل if، for یا def باید کمی جلوتر باشند.'; if(e.includes('NameError')) return 'یک اسم را قبل از ساختن استفاده کرده‌ای. اول متغیر یا تابع را بساز، بعد صدایش بزن.'; if(e.includes('TypeError')) return 'دو چیز ناسازگار را با هم ترکیب کرده‌ای؛ مثلاً متن و عدد بدون تبدیل.'; return 'پایتون گیر کرد، اما این طبیعی است. خط آخر خطا را نگاه کن و یک تغییر کوچک بده.';}
  function cleanError(err){return String(err||'خطای نامشخص').split('\n').slice(-5).join('\n')}
  function repairPanel(ex){$('repairBox').innerHTML=`<div class="repair"><h3>مسیر نجات</h3><div class="repairBtns"><button onclick="showHint()">راهنمای کوچک</button><button onclick="openBreak()">۲۰ ثانیه مکث</button><button onclick="focusExpected('${esc(ex.target).replace(/\n/g,'\\n')}')">دیدن خروجی لازم</button></div></div>`}
  function focusExpected(t){toast('خروجی لازم: '+t)}
  function showHint(){const l=lesson(); const ex=l.exercises[state.exercise]||l.exercises[0]; state.hints++; const idx=Math.min(state.hints % (ex.hints.length+1), ex.hints.length-1); setFeedback('warn', ex.hints[idx]); save(); maybeBreak();}
  async function runProject(){const l=lesson(); const key='project:'+l.id; const code=$('projectBox').value.trim(); state.projectDrafts[key]=code; if(!code){$('projectFeedback').innerHTML=`<div class="feedback bad">اول یک کد خیلی کوتاه بنویس.</div>`;return;} $('projectOut').textContent='در حال اجرا...'; const res=await runPython(code); $('projectOut').textContent=res.ok ? (res.output||'بدون خروجی') : cleanError(res.error); if(!res.ok){$('projectFeedback').innerHTML=`<div class="feedback bad">${friendlyError(res.error)}</div>`;return;} const out=norm(res.output); const ok=checkAll(l.project.checks,code,out); if(ok.ok){$('projectFeedback').innerHTML=`<div class="feedback good"><b>چالش قبول شد.</b> آماده جمع‌بندی هستی.</div>`; $('finishProjectBtn').disabled=false; addStars(5); celebrate();} else {$('projectFeedback').innerHTML=`<div class="feedback warn">${ok.msg}</div>`}}
  function projectHint(){const l=lesson(); toast(l.project.steps[0]);}
  function finishLesson(){const l=lesson(); const r=($('reflectionBox')?.value||'').trim(); if(r.length<3){toast('یک جمله خیلی کوتاه بنویس.'); return;} state.completed[l.id]=true; addStars(8); celebrate(); if(state.lesson<LESSONS.length-1) state.lesson++; state.stage=0; state.card=0; state.example=0; state.exercise=0; state.route='home'; save(); render();}
  function maybeBreak(){ if((state.attempts>0 && state.attempts%4===0) || (state.hints>0 && state.hints%3===0)) openBreak(); }
  function openBreak(){$('breakModal').classList.add('show');$('breakModal').setAttribute('aria-hidden','false')}
  function closeBreak(){$('breakModal').classList.remove('show');$('breakModal').setAttribute('aria-hidden','true')}

  function reviewItems(){const items=[]; for(const l of LESSONS){const pass=Object.keys(state.passed).filter(k=>k.startsWith(l.id+':')).length; if(!state.completed[l.id] && (pass>0 || l.id===lesson().id)) items.push(l);} return items.slice(0,5)}
  function renderReview(){const items=reviewItems(); $('review').innerHTML=`<section class="card hero"><span class="eyebrow">مرور هوشمند</span><h2 class="title">فقط همان جاهایی که هنوز کامل نشده‌اند.</h2><p class="sub">مرور کوتاه است؛ یک نمونه ببین، یک تمرین کوچک انجام بده، تمام.</p></section><section class="card"><div class="reviewList">${items.length?items.map((l)=>`<button class="lesson" onclick="selectLesson(${LESSONS.indexOf(l)})"><div class="lessonIcon">${l.icon}</div><div><h3>${l.title}</h3><p>${l.goal}</p></div><span class="btn soft">ادامه</span></button>`).join(''):'<div class="empty">فعلاً چیزی برای مرور فوری نیست.</div>'}</div></section>`}
  function renderProjects(){ $('projects').innerHTML=`<section class="card hero"><span class="eyebrow">چالش‌های کوچک</span><h2 class="title">هر درس یک خروجی واقعی دارد.</h2><p class="sub">چالش‌ها برای این هستند که کد فقط تمرین کتابی نباشد؛ یک چیز کوچک بسازی.</p></section><section class="projectGrid">${LESSONS.map((l,i)=>`<article class="project"><h3>${l.icon} ${l.project.title}</h3><p>${l.project.brief}</p><ul>${l.project.steps.map(s=>`<li>${esc(s)}</li>`).join('')}</ul><button class="btn soft" style="margin-top:12px" onclick="openProject(${i})">رفتن به چالش</button></article>`).join('')}</section>`;}
  function rescue(){const k=stageKey(); const messages={hook:'فقط دکمه شروع را بزن. هنوز لازم نیست کد بنویسی.',cards:'یک نکته کوتاه بخوان و دکمه بعدی را بزن.',example:'کد نمونه را فقط نگاه کن. لازم نیست حفظ کنی.',predict:'اول حدس بزن؛ اشتباه بودنش مشکلی ندارد.',practice:'در جعبه خالی فقط خط اول را بنویس. بعد اجرا کن.',project:'یکی از شرط‌های چالش را انتخاب کن و همان را بساز.',recap:'یک جمله کوتاه کافی است.'}; toast(messages[k]||'فقط قدم بعدی را انجام بده.');}
  function exportProgress(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='pythonkade-progress.json'; a.click(); URL.revokeObjectURL(a.href);}
  function saveReflection(id,val){state.reflections[id]=val; save();}
  function openProject(i){state.lesson=i; state.route='learn'; state.stage=5; state.card=0; state.example=0; state.exercise=0; save(); render();}
  window.routeTo=routeTo; window.selectLesson=selectLesson; window.openProject=openProject; window.saveReflection=saveReflection; window.nextStage=nextStage; window.nextCard=nextCard; window.nextExample=nextExample; window.pickPredict=pickPredict; window.saveDraft=saveDraft; window.saveProjectDraft=saveProjectDraft; window.runExercise=runExercise; window.showHint=showHint; window.clearEditor=clearEditor; window.focusExpected=focusExpected; window.runProject=runProject; window.projectHint=projectHint; window.finishLesson=finishLesson; window.openBreak=openBreak;
  document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>routeTo(b.dataset.route)));
  $('calmBtn').addEventListener('click',()=>{state.calm=!state.calm;save();render()});
  $('themeBtn').addEventListener('click',()=>{state.theme=state.theme==='dark'?'light':'dark';save();render()});
  $('rescueBtn').addEventListener('click',rescue);
  $('doneBreak').addEventListener('click',()=>{closeBreak();toast('خوب برگشتی. فقط یک خط بعدی.');});
  $('skipBreak').addEventListener('click',closeBreak);
  window.addEventListener('hashchange',()=>{const r=location.hash.replace('#','').replace('/','')||'home'; if(['home','learn','review','projects'].includes(r)){state.route=r;render();}});
  const firstHash=location.hash.replace('#','').replace('/',''); if(['home','learn','review','projects'].includes(firstHash)) state.route=firstHash;
  render();
  </script>
</body>
</html>
