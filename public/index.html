<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f7f7f8" />
  <title>پایتونکده نوجوان</title>
  <style>
    :root{
      --bg:#f7f7f8; --card:rgba(255,255,255,.86); --solid:#fff; --text:#111318; --muted:#6b7280; --line:rgba(17,19,24,.10);
      --soft:#eef0f4; --brand:#0a84ff; --brand2:#7c3aed; --good:#17a34a; --warn:#f59e0b; --bad:#ef4444; --ink:#101114;
      --shadow:0 22px 70px rgba(17,19,24,.08); --radius:30px; --radius2:20px; --max:1060px;
      --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Tahoma,Arial,sans-serif;
    }
    [data-theme="dark"]{--bg:#08090b;--card:rgba(22,24,29,.88);--solid:#15171c;--text:#f5f5f7;--muted:#a1a1aa;--line:rgba(255,255,255,.12);--soft:#20232b;--ink:#f7f7fb;--shadow:0 28px 80px rgba(0,0,0,.42);--brand:#5aa9ff;--brand2:#a78bfa}
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;background:radial-gradient(circle at 8% 0%,rgba(10,132,255,.12),transparent 28%),radial-gradient(circle at 88% 0%,rgba(124,58,237,.10),transparent 30%),var(--bg);color:var(--text);font-family:var(--font);line-height:1.65;min-height:100svh;}
    body.calm{background:var(--bg)} body.calm *{animation:none!important;transition:none!important} body.large{font-size:18px}
    button,textarea,input{font:inherit} button{cursor:pointer} .app{max-width:var(--max);margin:0 auto;padding:16px 16px calc(94px + env(safe-area-inset-bottom));}
    .top{position:sticky;top:0;z-index:20;margin:0 -16px 16px;padding:12px 16px 10px;background:linear-gradient(to bottom,var(--bg) 78%,transparent);backdrop-filter:blur(22px)}
    .topin{max-width:var(--max);margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:12px}.brand{display:flex;align-items:center;gap:10px;min-width:0}.logo{width:42px;height:42px;border-radius:16px;background:linear-gradient(135deg,var(--brand),var(--brand2));display:grid;place-items:center;color:white;font-weight:950;box-shadow:0 16px 34px rgba(10,132,255,.24)}.brand h1{font-size:16px;margin:0;letter-spacing:-.03em}.brand p{font-size:12px;margin:0;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.topBtns{display:flex;gap:8px;align-items:center}.icon,.pill{border:1px solid var(--line);background:var(--card);color:var(--text);min-height:42px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 10px 26px rgba(0,0,0,.04)}.icon{width:42px}.pill{padding:0 14px}.pill.primary{background:var(--text);color:var(--bg);border-color:var(--text)}
    .thinbar{height:6px;background:var(--soft);border-radius:99px;overflow:hidden;margin-top:10px}.thinbar span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--brand),var(--brand2));border-radius:99px;transition:width .35s ease}.layout{display:grid;grid-template-columns:268px 1fr;gap:18px;align-items:start}.rail{position:sticky;top:82px;border:1px solid var(--line);background:var(--card);border-radius:var(--radius);padding:10px;box-shadow:var(--shadow);backdrop-filter:blur(26px)}.nav{width:100%;border:0;background:transparent;color:var(--muted);border-radius:18px;padding:12px;display:flex;align-items:center;gap:10px;text-align:right;margin:3px 0}.nav.active{background:var(--text);color:var(--bg)}.nav b{font-size:14px}.nav small{display:block;font-size:11px;opacity:.72}.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.stat{background:var(--soft);border-radius:18px;padding:10px}.stat b{display:block;font-size:19px;line-height:1}.stat span{font-size:11px;color:var(--muted)}
    .main{min-width:0}.card{border:1px solid var(--line);background:var(--card);border-radius:var(--radius);padding:22px;margin-bottom:14px;box-shadow:var(--shadow);backdrop-filter:blur(26px)}.solid{background:var(--solid)}.hero{padding:28px}.eyebrow{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--solid);border-radius:999px;padding:6px 10px;color:var(--muted);font-size:12px}.title{font-size:clamp(30px,7vw,60px);line-height:1.04;letter-spacing:-.07em;margin:14px 0 10px}.sub{font-size:clamp(15px,2.1vw,19px);color:var(--muted);max-width:700px;margin:0}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.between{display:flex;justify-content:space-between;align-items:center;gap:12px}.btn{border:0;background:var(--text);color:var(--bg);border-radius:999px;padding:12px 17px;min-height:46px;font-weight:900;display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn.ghost{background:var(--soft);color:var(--text)}.btn.soft{background:var(--solid);color:var(--text);border:1px solid var(--line)}.btn.good{background:var(--good);color:#fff}.btn.bad{background:var(--bad);color:#fff}.btn.warn{background:var(--warn);color:#1a1200}.btn:disabled{opacity:.48;cursor:not-allowed}.singleAction{width:100%;font-size:17px;min-height:54px}
    .next{border:1px solid rgba(10,132,255,.24);background:linear-gradient(180deg,rgba(10,132,255,.10),rgba(255,255,255,.02));border-radius:26px;padding:18px}.next small{display:block;color:var(--brand);font-weight:950;margin-bottom:4px}.next b{display:block;font-size:26px;line-height:1.22;letter-spacing:-.045em}.next p{margin:6px 0 0;color:var(--muted)}.missionHead{display:grid;grid-template-columns:72px 1fr;gap:14px;align-items:center}.avatar{width:72px;height:72px;border-radius:25px;background:linear-gradient(135deg,rgba(10,132,255,.16),rgba(124,58,237,.14));display:grid;place-items:center;font-size:34px}.missionHead h2{margin:0;font-size:25px;line-height:1.15;letter-spacing:-.04em}.missionHead p{margin:4px 0 0;color:var(--muted)}
    .missionShell{display:grid;gap:14px}.progressDots{display:flex;gap:7px;align-items:center;overflow:auto;padding:1px 0}.dot{height:10px;min-width:10px;border-radius:999px;background:var(--soft);border:1px solid var(--line)}.dot.on{width:42px;background:linear-gradient(90deg,var(--brand),var(--brand2));border:0}.dot.done{background:rgba(23,163,74,.28);border-color:rgba(23,163,74,.20)}.phaseCard{min-height:420px;display:grid;align-content:center;gap:16px}.phaseTitle{font-size:clamp(28px,6vw,50px);line-height:1.07;letter-spacing:-.07em;margin:0}.phaseText{font-size:clamp(17px,2.2vw,21px);color:var(--muted);margin:0;max-width:720px}.microText{font-size:clamp(22px,4vw,35px);line-height:1.23;letter-spacing:-.055em;font-weight:950;margin:0}.tiny{font-size:12px;color:var(--muted)}.focusLine{background:var(--soft);border-radius:20px;padding:13px;display:flex;gap:10px;align-items:flex-start}.focusLine strong{display:block}.reveal{display:grid;gap:10px}.revealItem{background:var(--soft);border-radius:20px;padding:14px}.revealItem b{display:block;margin-bottom:2px}.code{direction:ltr;text-align:left;background:#101114;color:#f7f7fb;border-radius:22px;padding:16px;font:14px/1.55 "SF Mono",Consolas,monospace;overflow:auto;white-space:pre}.code.light{background:var(--soft);color:var(--text)}.choiceGrid{display:grid;gap:10px}.choice{border:1px solid var(--line);background:var(--solid);border-radius:20px;padding:15px;text-align:right;color:var(--text)}.choice.ok{border-color:rgba(23,163,74,.50);background:rgba(23,163,74,.10)}.choice.no{border-color:rgba(239,68,68,.46);background:rgba(239,68,68,.08)}
    .lab{display:grid;gap:12px}.missionStrip{border:1px solid var(--line);background:var(--solid);border-radius:24px;padding:14px}.missionStrip h3{margin:0 0 5px;font-size:22px;letter-spacing:-.035em}.missionStrip p{margin:0;color:var(--muted)}.reqs{display:grid;gap:8px;margin-top:12px}.req{background:var(--soft);border-radius:16px;padding:10px;display:flex;gap:8px;align-items:flex-start}.req span{color:var(--good);font-weight:950}.editor{width:100%;min-height:235px;border:1px solid var(--line);border-radius:24px;background:#101114;color:#f7f7fb;padding:16px;resize:vertical;direction:ltr;text-align:left;font:14px/1.58 "SF Mono",Consolas,monospace;outline:none}.editor:focus{border-color:var(--brand);box-shadow:0 0 0 4px rgba(10,132,255,.14)}.out{min-height:78px;background:var(--soft);border-radius:22px;padding:14px;white-space:pre-wrap;direction:ltr;text-align:left;font:13px/1.5 "SF Mono",Consolas,monospace}.feedback{border-radius:22px;padding:14px;margin-top:8px}.feedback.good{background:rgba(23,163,74,.12)}.feedback.bad{background:rgba(239,68,68,.10)}.feedback.warn{background:rgba(245,158,11,.12)}.repairBox{border:1px solid rgba(245,158,11,.35);background:rgba(245,158,11,.10);border-radius:24px;padding:14px}.repairBox h3{margin:0 0 8px}.repairGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.repairGrid button{border:1px solid var(--line);background:var(--solid);border-radius:16px;padding:11px;color:var(--text)}
    .map{display:grid;gap:10px}.lesson{border:1px solid var(--line);background:var(--solid);border-radius:24px;padding:14px;display:grid;grid-template-columns:52px 1fr auto;gap:12px;align-items:center}.lesson.lock{opacity:.52}.lessonIcon{width:52px;height:52px;border-radius:19px;background:var(--soft);display:grid;place-items:center;font-size:26px}.lesson h3{margin:0;font-size:16px}.lesson p{margin:2px 0 0;color:var(--muted);font-size:12px}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{font-size:11px;color:var(--muted);background:var(--soft);border-radius:999px;padding:4px 8px}.projectGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.project{border:1px solid var(--line);background:var(--solid);border-radius:24px;padding:16px}.project h3{margin:0 0 6px}.project p,.project li{color:var(--muted)}.project ul{margin:10px 0 0;padding-right:18px}.reviewList{display:grid;gap:10px}.empty{padding:32px;text-align:center;color:var(--muted)}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.34);z-index:60;display:none;place-items:end center;padding:16px}.modal.show{display:grid}.sheet{max-width:660px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:30px;padding:20px;box-shadow:var(--shadow);backdrop-filter:blur(24px)}.sheet h2{margin:0 0 8px;font-size:28px;letter-spacing:-.045em}.sheet p{color:var(--muted)}.toast{position:fixed;left:50%;bottom:calc(86px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);border-radius:999px;padding:12px 16px;z-index:70;opacity:0;pointer-events:none;transition:.22s;max-width:min(92vw,620px);text-align:center}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .bottom{position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgba(247,247,248,.84);backdrop-filter:blur(24px);border-top:1px solid var(--line);padding:8px max(8px,env(safe-area-inset-left)) calc(8px + env(safe-area-inset-bottom))}.bottomIn{max-width:620px;margin:0 auto;display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.bnav{border:0;background:transparent;color:var(--muted);border-radius:16px;padding:7px 4px;display:grid;place-items:center;font-size:11px}.bnav span{font-size:20px;line-height:1}.bnav.active{background:var(--text);color:var(--bg)}[data-theme="dark"] .bottom{background:rgba(8,9,11,.82)}
    @media (max-width:860px){.layout{grid-template-columns:1fr}.rail{display:none}.app{padding-inline:12px}.top{margin-inline:-12px;padding-inline:12px}.phaseCard{min-height:calc(100svh - 250px)}.projectGrid{grid-template-columns:1fr}.topBtns .pill.hideSmall{display:none}.missionHead{grid-template-columns:58px 1fr}.avatar{width:58px;height:58px;border-radius:21px;font-size:30px}.repairGrid{grid-template-columns:1fr}.card{padding:18px;border-radius:26px}.hero{padding:24px 18px}.lesson{grid-template-columns:46px 1fr}.lesson .btn{grid-column:1/-1;width:100%}.lessonIcon{width:46px;height:46px}.phaseTitle{font-size:34px}.microText{font-size:26px}.editor{min-height:230px}.brand p{max-width:160px}.title{font-size:42px}} 
    @media (min-width:861px){.bottom{display:none}.hideDesktop{display:none!important}} body.focus .rail, body.focus .bottom, body.focus .brand p, body.focus #miniStatsMobile{display:none!important} body.focus .layout{grid-template-columns:1fr} body.focus .app{max-width:850px}.sr{position:absolute;left:-9999px}
  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="topin">
        <div class="brand"><div class="logo">پای</div><div><h1>پایتونکده نوجوان</h1><p>قدم‌های کوتاه برای یادگیری واقعی پایتون</p></div></div>
        <div class="topBtns">
          <button class="icon" id="focusBtn" title="تمرکز">◎</button>
          <button class="icon" id="calmBtn" title="حالت آرام">◌</button>
          <button class="icon" id="themeBtn" title="روشن/تاریک">◐</button>
          <button class="pill primary hideSmall" data-view="mission">ادامه درس</button>
        </div>
      </div>
      <div class="thinbar"><span id="courseBar"></span></div>
    </header>
    <div class="layout">
      <aside class="rail">
        <button class="nav" data-view="home"><span>🏠</span><div><b>خانه</b><small>فقط قدم بعدی</small></div></button>
        <button class="nav" data-view="mission"><span>⚡</span><div><b>درس امروز</b><small>فقط قدم بعدی</small></div></button>
        <button class="nav" data-view="map"><span>🗺️</span><div><b>نقشه</b><small>درس‌ها و قفل‌ها</small></div></button>
        <button class="nav" data-view="projects"><span>🎮</span><div><b>چالش‌ها</b><small>چالش‌های پایانی</small></div></button>
        <button class="nav" data-view="review"><span>🔁</span><div><b>مرور</b><small>نقاط سخت</small></div></button>
        <div class="stats">
          <div class="stat"><b id="xpStat">0</b><span>امتیاز</span></div>
          <div class="stat"><b id="coinStat">0</b><span>سکه</span></div>
          <div class="stat"><b id="streakStat">0</b><span>روز پیوسته</span></div>
          <div class="stat"><b id="doneStat">0</b><span>درس کامل</span></div>
        </div>
      </aside>
      <main class="main" id="main"></main>
    </div>
  </div>
  <nav class="bottom">
    <div class="bottomIn">
      <button class="bnav" data-view="home"><span>🏠</span>خانه</button>
      <button class="bnav" data-view="mission"><span>⚡</span>درس امروز</button>
      <button class="bnav" data-view="map"><span>🗺️</span>نقشه</button>
      <button class="bnav" data-view="projects"><span>🎮</span>چالش</button>
      <button class="bnav" data-view="review"><span>🔁</span>مرور</button>
    </div>
  </nav>
  <div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>
  <div class="toast" id="toast"></div>
  <script>
const LESSONS = [
 {id:'output', emoji:'📣', title:'چاپ خروجی', skill:'output', hook:'ربات تو فقط وقتی زنده می‌شود که پیامش را روی صفحه چاپ کنی.', goal:'با print به برنامه صدا بده.',
  story:'ربات پیام‌رسان گم شده. باید اولین پیامش را با Python روی صفحه ظاهر کنی.',
  cards:[
    {h:'print یعنی نشان بده', t:'وقتی می‌نویسی print("سلام")، پایتون متن داخل پرانتز را روی صفحه خروجی نشان می‌دهد.'},
    {h:'متن داخل کوتیشن است', t:'هر چیزی که کلمه یا جمله است باید بین " " یا \' \' باشد. بدون کوتیشن، پایتون فکر می‌کند اسم یک چیز است.'},
    {h:'هر print یک خط می‌سازد', t:'اگر دو بار print بنویسی، خروجی معمولاً در دو خط جدا نمایش داده می‌شود.'}
  ],
  examples:[
    {title:'یک پیام', code:'print("سلام دنیا")', output:'سلام دنیا', why:'متن دقیقاً همان چیزی است که داخل کوتیشن نوشته‌ای.'},
    {title:'دو خط', code:'print("شروع")\nprint("برد")', output:'شروع\nبرد', why:'هر print خروجی خودش را در یک خط جدا می‌فرستد.'},
    {title:'عدد بدون کوتیشن', code:'print(7)', output:'7', why:'عدد لازم نیست داخل کوتیشن باشد.'}
  ],
  predict:{code:'print("Python")\nprint(3)', choices:['Python3','Python\n3','"Python"\n3'], answer:1, why:'دو دستور print داریم، پس دو خط خروجی داریم.'},
  exercises:[
    {id:'o1', title:'پیام ربات', prompt:'فقط این متن را چاپ کن: ربات بیدار شد', target:'ربات بیدار شد', checks:[['exact','ربات بیدار شد'],['code','print']], hints:['از print استفاده کن.','متن باید داخل کوتیشن باشد.']},
    {id:'o2', title:'دو پیام', prompt:'دو خط چاپ کن: خط اول «شروع» و خط دوم «پایان».', target:'شروع\nپایان', checks:[['exact','شروع\nپایان'],['count','print',2]], hints:['دو دستور print بنویس.','هر پیام در یک print جدا باشد.']},
    {id:'o3', title:'عدد روی تابلو', prompt:'عدد 2026 را چاپ کن.', target:'2026', checks:[['exact','2026']], hints:['می‌توانی عدد را بدون کوتیشن چاپ کنی.','print(2026) شکل کلی آن است.']},
    {id:'o4', title:'علامت برد', prompt:'دقیقاً چاپ کن: برد! برد! برد!', target:'برد! برد! برد!', checks:[['exact','برد! برد! برد!']], hints:['همه جمله یک متن است.','داخل کوتیشن بنویس.']}
  ],
  boss:{title:'تابلوی شروع بازی', brief:'یک تابلوی سه‌خطی برای شروع برنامه بساز.', steps:['خط اول: نام بازی','خط دوم: آماده‌ای؟','خط سوم: شروع!'], checks:[['lines',3],['containsOut','شروع!'],['code','print']]}
 },
 {id:'variables', emoji:'🎒', title:'متغیرها', skill:'variables', hook:'برای بازی باید نام بازیکن و امتیاز را در کوله‌پشتی برنامه نگه داری.', goal:'داده را با اسم ذخیره کن و دوباره استفاده کن.',
  story:'بازیکن وارد بازی شده، اما برنامه هنوز اسم و سکه‌هایش را یادش نمی‌ماند.',
  cards:[
    {h:'متغیر یک جعبه اسم‌دار است', t:'name = "نیما" یعنی متن «نیما» را در جعبه‌ای به نام name بگذار.'},
    {h:'اسم متغیر را دوباره استفاده می‌کنی', t:'بعداً با print(name) مقدار داخل جعبه را چاپ می‌کنی.'},
    {h:'مقدار قابل تغییر است', t:'اگر score = 5 و بعد score = 9 بنویسی، مقدار جدید ۹ می‌شود.'}
  ],
  examples:[
    {title:'ذخیره نام', code:'name = "رها"\nprint(name)', output:'رها', why:'name به متن «رها» اشاره می‌کند.'},
    {title:'متن ترکیبی', code:'pet = "اژدها"\nprint("حیوان من: " + pet)', output:'حیوان من: اژدها', why:'متن ثابت با مقدار متغیر ترکیب شده است.'},
    {title:'امتیاز', code:'score = 10\nprint(score)', output:'10', why:'عدد داخل متغیر ذخیره و چاپ شد.'}
  ],
  predict:{code:'hero = "آریا"\nprint("سلام " + hero)', choices:['سلام hero','سلام آریا','"سلام" + آریا'], answer:1, why:'hero مقدار «آریا» را نگه داشته است.'},
  exercises:[
    {id:'v1', title:'نام بازیکن', prompt:'متغیری به نام player بساز که مقدارش «سارا» باشد و آن را چاپ کن.', target:'سارا', checks:[['exact','سارا'],['code','player']], hints:['اول player = "سارا" بنویس.','بعد player را چاپ کن.']},

}
function choosePrediction(i){const l=L(); state.predict[l.id]=i; if(i===l.predict.answer){xp(12); toast('حدست درست بود ⚡')}else{state.weak[l.skill]=(state.weak[l.skill]||0)+1; toast('اشکال ندارد؛ همین حالا یک نکته یاد گرفتی')}; save(); render();}
function giveHint(){const l=L(), ex=currentExercise(), key=l.id+':'+ex.id; const used=state.hints[key]||0; state.hints[key]=used+1; state.weak[l.skill]=(state.weak[l.skill]||0)+1; const h=ex.hints[Math.min(used,ex.hints.length-1)]||'مسئله را به یک خط کوچک‌تر تبدیل کن.'; save(); modal('راهنمای کوچک', `<p>${esc(h)}</p><p class="tiny">راهنما جواب کامل را نمی‌دهد؛ فقط قدم بعدی را نشان می‌دهد.</p>`); if(used>=1)showBreak(false);}
function showRescue(){modal('کمک، گیج شدم', `<p><b>الان فقط این کار را انجام بده:</b></p><p>${nextText()}</p><div class="reveal"><div class="revealItem"><b>اگر صفحه شلوغ به نظر رسید</b>حالت تمرکز ◎ را روشن کن.</div><div class="revealItem"><b>اگر کد اجرا نشد</b>اول فقط خروجی هدف را دوباره بخوان.</div><div class="revealItem"><b>اگر ذهنت خسته شد</b>۲۰ ثانیه بلند شو، شانه‌ها را تکان بده، برگرد و فقط یک خط کد بنویس.</div></div>`)}
function showBreak(open=true){modal('استراحت ۲۰ ثانیه‌ای', `<p>بلند شو، سه نفس آرام بکش، شانه‌هایت را بچرخان، بعد برگرد و فقط یک خط بعدی را بنویس.</p><p class="tiny">این مکث کوتاه کمک می‌کند ذهنت دوباره آماده شود؛ قرار نیست با کسی مسابقه بدهی.</p>`, open)}
function modal(title, html, open=true){$('#sheet').innerHTML=`<h2>${title}</h2>${html}<div class="row"><button class="btn singleAction" data-close>برگشت به درس</button></div>`; $('#modal').classList.add('show'); $('[data-close]').onclick=()=>$('#modal').classList.remove('show')}
$('#modal').addEventListener('click',e=>{if(e.target.id==='modal')$('#modal').classList.remove('show')});
async function ensureWorker(){ if(pyWorker)return pyWorker; const code=`
let pyodideReady=null;
async function init(){ importScripts('https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js'); self.pyodide=await loadPyodide(); }
self.onmessage=async (e)=>{ const {id,code}=e.data; try{ if(!pyodideReady) pyodideReady=init(); await pyodideReady; self.pyodide.setStdout({batched:(s)=>{self._out=(self._out||'')+s}}); self.pyodide.setStderr({batched:(s)=>{self._err=(self._err||'')+s}}); self._out=''; self._err=''; await self.pyodide.runPythonAsync(code); self.postMessage({id,ok:true,out:self._out||'',err:self._err||''}); } catch(err){ self.postMessage({id,ok:false,out:self._out||'',err:String(err && err.message || err)}); } }`;
 const blob=new Blob([code],{type:'text/javascript'}); pyWorker=new Worker(URL.createObjectURL(blob)); return pyWorker; }
async function runPy(code, timeout=4800){const id=++runSeq; const w=await ensureWorker(); return new Promise((resolve)=>{let done=false; const timer=setTimeout(()=>{if(done)return; done=true; try{w.terminate()}catch(e){} pyWorker=null; resolve({ok:false,out:'',err:'زمان اجرا تمام شد. احتمالاً حلقه بی‌پایان یا کد خیلی سنگین داری.'})},timeout); const handler=e=>{if(e.data.id!==id)return; if(done)return; done=true; clearTimeout(timer); w.removeEventListener('message',handler); resolve(e.data)}; w.addEventListener('message',handler); w.postMessage({id,code});})}
function norm(s){return String(s||'').replace(/\r/g,'').trim()}
function validate(checks,out,code){const n=norm(out); for(const [type,val,extra] of checks){ if(type==='exact' && n!==val)return false; if(type==='containsOut' && !n.includes(val))return false; if(type==='code' && !code.includes(val))return false; if(type==='count'){const c=(code.match(new RegExp(val.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g'))||[]).length; if(c<extra)return false;} if(type==='lines' && n.split('\n').filter(Boolean).length!==val)return false; if(type==='linesMin' && n.split('\n').filter(Boolean).length<val)return false; if(type==='anyNumberOut' && !/\d/.test(n))return false;} return true;}
function explainErr(err){if(/SyntaxError/.test(err))return 'SyntaxError یعنی شکل کد درست نیست: کوتیشن، پرانتز، دو نقطه یا ترتیب کلمات را چک کن.'; if(/IndentationError/.test(err))return 'IndentationError یعنی فاصله‌های اول خط درست نیست. زیر if، for یا def باید کمی جلوتر باشد.'; if(/NameError/.test(err))return 'NameError یعنی پایتون یک اسم را نمی‌شناسد. اسم متغیر را یکسان و دقیق بنویس.'; if(/TypeError/.test(err))return 'TypeError یعنی نوع داده‌ها با هم جور نیستند؛ مثلاً متن و عدد را مستقیم جمع کرده‌ای.'; if(/زمان اجرا/.test(err))return err; return 'کد اجرا نشد. از یک خط ساده شروع کن و دوباره امتحان کن.'}
async function runExercise(){const l=L(), ex=currentExercise(), key=l.id+':'+ex.id, code=$('#editor').value.trim(), box=$('#runResult'); if(!code){toast('جعبه کدنویسی خالی است؛ فقط یک خط کد بنویس'); return} state.drafts[key]=code; state.attempts[key]=(state.attempts[key]||0)+1; save(); box.innerHTML='<div class="feedback warn">کد در حال اجراست...</div>'; const r=await runPy(code); const out=norm((r.out||'')+(r.err?('\n'+r.err):'')); if(r.ok && validate(ex.checks,r.out,code)){state.passed[l.id]=state.passed[l.id]||{}; if(!state.passed[l.id][ex.id])xp(28); state.passed[l.id][ex.id]=true; save(); box.innerHTML=`<div class="feedback good"><b>درست شد ⚡</b><pre class="out">${esc(norm(r.out))}</pre><p>خروجی درست است. حالا می‌توانی سراغ تمرین بعدی بروی.</p></div>`; const bossBtn=document.querySelector('[data-to-boss]'); if(bossBtn && passedFor(l.id)>=2) bossBtn.disabled=false; if(passedFor(l.id)>=2)toast('چالش پایانی باز شد 🎮')} else {state.weak[l.skill]=(state.weak[l.skill]||0)+1; save(); box.innerHTML=`<div class="feedback bad"><b>هنوز درست نشده؛ کمک سریع آماده است.</b><pre class="out">${esc(out||'(خروجی خالی)')}</pre><p>${r.ok?'خروجی هنوز با هدف یکی نیست. هدف را دوباره ببین و فقط یک تغییر کوچک بده.':explainErr(r.err)}</p></div>`;} }
async function runBoss(){const l=L(), code=$('#bossEditor').value.trim(), box=$('#runResult'); if(!code){toast('چالش خالی است؛ فعلاً فقط مرحله اول را بنویس'); return} state.bossDrafts[l.id]=code; save(); box.innerHTML='<div class="feedback warn">در حال اجرای چالش...</div>'; const r=await runPy(code); const out=norm((r.out||'')+(r.err?('\n'+r.err):'')); if(r.ok && validate(l.boss.checks,r.out,code)){if(!state.bossPassed[l.id])xp(45); state.bossPassed[l.id]=true; save(); box.innerHTML=`<div class="feedback good"><b>چالش پایانی انجام شد 🎮</b><pre class="out">${esc(norm(r.out))}</pre><p>چالش پایانی درست انجام شد. حالا برو سراغ جمع‌بندی.</p></div>`; render();} else {state.weak[l.skill]=(state.weak[l.skill]||0)+1; save(); box.innerHTML=`<div class="feedback bad"><b>چالش هنوز کامل نشده است.</b><pre class="out">${esc(out||'(خروجی خالی)')}</pre><p>${r.ok?'دست‌کم یکی از شرط‌های چالش کامل نیست. فقط مرحله اول یا دوم را اصلاح کن.':explainErr(r.err)}</p></div>`;} }
function finishLesson(){const l=L(); const text=($('#reflect')?.value||'').trim(); if(text.length<3){toast('فقط یک جمله خیلی کوتاه بنویس');return} state.reflect[l.id]=text; if(!state.done[l.id])xp(60); state.done[l.id]=true; if(lessonIndex<LESSONS.length-1){lessonIndex++; state.lessonIndex=lessonIndex; phase=state.phase='hook'; cardIndex=0; exampleIndex=0; exerciseIndex=0; state.cardIndex=0; state.exampleIndex=0; toast('درس بعدی آماده شد 🚀')} else {toast('کل مسیر پایه را کامل کردی 💎')} save(); setView('home');}
document.addEventListener('click',e=>{const b=e.target.closest('button'); if(!b)return; if(b.id==='focusBtn'){state.focus=!state.focus;save();render()} if(b.id==='calmBtn'){state.calm=!state.calm;save();render()} if(b.id==='themeBtn'){state.theme=state.theme==='dark'?'light':'dark';save();render()}});
window.addEventListener('hashchange',()=>{view=initialView();render()});
render();
  </script>
