  <title>Python Quest — آکادمی تمرکز</title>
  <style>
    :root{

    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;background:radial-gradient(circle at 12% 8%, rgba(10,132,255,.12), transparent 28%),radial-gradient(circle at 86% 6%, rgba(110,92,255,.11), transparent 26%),var(--bg);color:var(--text);font-family:var(--font);min-height:100svh;line-height:1.65;}
    body.calm{background:var(--bg)} body.calm *{animation:none!important;transition:none!important} body.big{font-size:18px} button,input,textarea,select{font:inherit} button{cursor:pointer} .app{max-width:var(--max);margin:0 auto;padding:22px 18px calc(94px + env(safe-area-inset-bottom))}

    .toprow{max-width:var(--max);margin:0 auto;display:flex;gap:12px;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:10px;min-width:0}.logo{width:42px;height:42px;border-radius:15px;background:linear-gradient(135deg,var(--brand),var(--brand2));box-shadow:0 12px 30px rgba(10,132,255,.24);display:grid;place-items:center;color:white;font-weight:900}.brand h1{font-size:16px;margin:0;letter-spacing:-.02em}.brand p{font-size:12px;margin:0;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.actions{display:flex;gap:8px;align-items:center}.iconbtn,.pillbtn{border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:999px;min-height:42px;padding:0 13px;display:inline-flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 10px 28px rgba(0,0,0,.04)}.iconbtn{width:42px;padding:0}.pillbtn.primary{background:var(--text);color:var(--bg);border-color:var(--text)}
    .progressbar{height:7px;background:var(--soft);border-radius:99px;overflow:hidden;margin-top:12px}.progressbar span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--brand),var(--brand2));border-radius:99px;transition:width .35s ease}

    .main{min-width:0}.card{border:1px solid var(--line);background:var(--card);backdrop-filter:blur(24px);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px;margin-bottom:16px}.hero{padding:28px}.eyebrow{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:999px;padding:6px 10px;background:var(--card2);color:var(--muted);font-size:12px}.title{font-size:clamp(28px,6vw,56px);line-height:1.06;letter-spacing:-.065em;margin:14px 0 10px}.subtitle{font-size:clamp(15px,2.2vw,19px);color:var(--muted);margin:0;max-width:720px}.ctaRow{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.button{border:0;background:var(--text);color:var(--bg);padding:13px 18px;border-radius:999px;font-weight:850;display:inline-flex;align-items:center;gap:8px;min-height:46px}.button.ghost{background:var(--soft);color:var(--text)}.button.soft{background:var(--card2);color:var(--text);border:1px solid var(--line)}.button.good{background:var(--good);color:#fff}.button.bad{background:var(--bad);color:#fff}.button:disabled{opacity:.45;cursor:not-allowed}
    .mission{display:grid;grid-template-columns:72px 1fr;gap:14px;align-items:center}.avatar{width:72px;height:72px;border-radius:24px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(10,132,255,.16),rgba(110,92,255,.14));font-size:34px}.mission h2{margin:0;font-size:22px;letter-spacing:-.035em}.mission p{margin:4px 0 0;color:var(--muted)}.focusCard{border:1px solid rgba(10,132,255,.25);background:linear-gradient(180deg,rgba(10,132,255,.10),rgba(255,255,255,.02));border-radius:24px;padding:18px}.stepBadge{font-size:12px;color:var(--brand);font-weight:900;margin-bottom:7px}.nextText{font-size:24px;line-height:1.25;font-weight:900;letter-spacing:-.04em;margin:0}.tiny{font-size:12px;color:var(--muted)}
    .path{display:grid;gap:10px}.lessonRow{border:1px solid var(--line);background:var(--card2);border-radius:22px;padding:14px;display:grid;grid-template-columns:48px 1fr auto;gap:12px;align-items:center}.lessonRow.locked{opacity:.52}.lessonIcon{width:48px;height:48px;border-radius:17px;background:var(--soft);display:grid;place-items:center;font-size:24px}.lessonRow h3{margin:0;font-size:15px}.lessonRow p{margin:1px 0 0;color:var(--muted);font-size:12px}.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.chip{font-size:11px;color:var(--muted);background:var(--soft);border-radius:999px;padding:4px 8px}.doneMark{color:var(--good);font-weight:900}.lockMark{color:var(--muted)}

    .predictGrid{display:grid;gap:10px}.choice{border:1px solid var(--line);background:var(--card2);border-radius:18px;padding:14px;text-align:right;color:var(--text)}.choice.correct{border-color:rgba(22,163,74,.5);background:rgba(22,163,74,.10)}.choice.wrong{border-color:rgba(239,68,68,.45);background:rgba(239,68,68,.08)}

    .projectGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.project{border:1px solid var(--line);border-radius:24px;background:var(--card2);padding:16px}.project h3{margin:0 0 6px}.project p{color:var(--muted);margin:0}.project ul{padding-right:18px;margin:10px 0;color:var(--muted)}.reviewList{display:grid;gap:10px}.empty{padding:32px;text-align:center;color:var(--muted)}
    .reflection{width:100%;min-height:110px;border:1px solid var(--line);border-radius:22px;padding:14px;background:var(--card2);color:var(--text);resize:vertical;outline:none}.reflection:focus{border-color:var(--brand);box-shadow:0 0 0 4px rgba(10,132,255,.14)}.toast{position:fixed;left:50%;bottom:calc(88px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(30px);opacity:0;z-index:100;background:rgba(17,19,24,.92);color:#fff;border-radius:999px;padding:12px 16px;box-shadow:0 18px 44px rgba(0,0,0,.24);transition:.25s ease;max-width:min(92vw,560px);text-align:center}.toast.show{transform:translateX(-50%) translateY(0);opacity:1}.modal{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.38);backdrop-filter:blur(12px);display:none;align-items:center;justify-content:center;padding:18px}.modal.show{display:flex}.modalCard{max-width:560px;width:100%;background:var(--card2);color:var(--text);border-radius:32px;padding:24px;box-shadow:0 30px 100px rgba(0,0,0,.28)}.modalCard h2{font-size:30px;letter-spacing:-.05em;margin:0 0 8px}.modalCard p{color:var(--muted)}
    .bottomNav{display:none;position:fixed;left:10px;right:10px;bottom:calc(10px + env(safe-area-inset-bottom));z-index:60;background:rgba(255,255,255,.82);backdrop-filter:blur(24px);border:1px solid var(--line);border-radius:24px;padding:7px;box-shadow:var(--shadow)}[data-theme="dark"] .bottomNav{background:rgba(22,24,29,.82)}.bottomNav button{flex:1;border:0;background:transparent;border-radius:18px;color:var(--muted);padding:8px 5px}.bottomNav button.active{background:var(--text);color:var(--bg)}.bottomNav span{display:block;font-size:20px}.bottomNav small{display:block;font-size:10px}
    body.focus .side, body.focus .miniStats, body.focus .brand p{display:none}body.focus .shell{grid-template-columns:1fr}body.focus .topbar{background:transparent}.confetti{position:fixed;pointer-events:none;inset:0;overflow:hidden;z-index:120}.dot{position:absolute;width:10px;height:10px;border-radius:50%;background:var(--brand);animation:fall .9s ease forwards}@keyframes fall{0%{transform:translateY(-30px) scale(1);opacity:1}100%{transform:translateY(100vh) scale(.5);opacity:0}}
    @media (max-width:860px){.app{padding:16px 12px calc(98px + env(safe-area-inset-bottom))}.topbar{margin:-16px -12px 14px;padding:12px}.shell{grid-template-columns:1fr}.side{display:none}.bottomNav{display:flex}.hero{padding:22px}.card{padding:17px;border-radius:24px}.title{font-size:38px}.lessonRow{grid-template-columns:44px 1fr auto}.lessonHeader{display:block}.lessonControls{justify-content:flex-start;margin-top:10px}.projectGrid{grid-template-columns:1fr}.micro{min-height:220px}.micro h3{font-size:24px}.micro p{font-size:16px}.actions .pillText{display:none}.button{width:100%;justify-content:center}.ctaRow .button{width:auto}.toprow{gap:8px}.brand h1{font-size:14px}.logo{width:38px;height:38px;border-radius:14px}.editor{min-height:240px;font-size:13px}.modalCard{border-radius:26px}}
    @media (max-width:430px){.title{font-size:34px}.lessonRow{padding:12px}.card{margin-bottom:12px}.micro h3{font-size:22px}.nextText{font-size:21px}.lessonHeader h2{font-size:26px}.stageTabs button{padding:8px 10px}.brand p{display:none}.iconbtn{width:39px;min-height:39px}.pillbtn{min-height:39px;padding:0 10px}}
    @media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important}}
  </style>

<body>
<div class="app" id="app">
  <header class="topbar">
    <div class="toprow">
      <div class="brand">
        <div class="logo">Py</div>
        <div><h1>Python Quest</h1><p>درس‌های خیلی کوچک، تمرین واقعی، پیشرفت آرام</p></div>
      </div>
      <div class="actions">
        <button class="iconbtn" id="calmBtn" title="حالت آرام">◌</button>
        <button class="iconbtn" id="themeBtn" title="تاریک/روشن">◐</button>
        <button class="pillbtn primary" id="focusBtn"><span>🎯</span><span class="pillText">تمرکز</span></button>
      </div>
    </div>
    <div class="progressbar"><span id="topProgress"></span></div>
  </header>
  <div class="shell">
    <aside class="side">
      <button class="navitem active" data-view="home"><span>🏠</span><b>خانه</b><small>شروع سریع</small></button>
      <button class="navitem" data-view="learn"><span>🧭</span><b>یادگیری</b><small>مسیر مأموریت‌ها</small></button>
      <button class="navitem" data-view="practice"><span>⌨️</span><b>تمرین</b><small>نوشتن از صفر</small></button>
      <button class="navitem" data-view="projects"><span>🛠️</span><b>پروژه‌ها</b><small>ساختنی‌های کوچک</small></button>
      <button class="navitem" data-view="review"><span>🔁</span><b>مرور</b><small>نقاط سخت</small></button>
      <div class="miniStats">
        <div class="stat"><b id="xpStat">0</b><span>XP</span></div>
        <div class="stat"><b id="streakStat">0</b><span>روز پیوسته</span></div>
        <div class="stat"><b id="doneStat">0</b><span>درس تمام</span></div>
        <div class="stat"><b id="levelStat">1</b><span>سطح</span></div>
      </div>
    </aside>
    <main class="main" id="main"></main>
  </div>
</div>
<nav class="bottomNav" id="bottomNav">
  <button class="active" data-view="home"><span>🏠</span><small>خانه</small></button>
  <button data-view="learn"><span>🧭</span><small>درس</small></button>
  <button data-view="practice"><span>⌨️</span><small>تمرین</small></button>
  <button data-view="projects"><span>🛠️</span><small>پروژه</small></button>
  <button data-view="review"><span>🔁</span><small>مرور</small></button>
</nav>
<div class="toast" id="toast"></div>
<div class="modal" id="rescueModal"><div class="modalCard"><h2>نقشه نجات</h2><p id="rescueText"></p><div class="ctaRow"><button class="button" id="closeRescue">فهمیدم، فقط قدم بعدی</button><button class="button ghost" id="breakBtn">۲۰ ثانیه ریست</button></div></div></div>
<div class="modal" id="rewardModal"><div class="modalCard"><h2 id="rewardTitle">برد کوچک!</h2><p id="rewardText"></p><div class="ctaRow"><button class="button" id="closeReward">ادامه بده</button></div></div></div>
<script>
'use strict';
const lessons=[
 {id:'output',emoji:'📣',title:'خروجی دادن با print',skill:'output',hook:'ربات تو بدون صداست. با print به او صدا بده.',goal:'یاد بگیر چطور برنامه حرف بزند.',bits:[
  ['اصل ماجرا','در پایتون، دستور print چیزی را روی صفحه نشان می‌دهد. این اولین راه دیدن نتیجه برنامه است.'],
  ['متن یعنی چه؟','هر چیزی که بین کوتیشن باشد، یک متن است. پایتون متن را دقیقاً همان‌طور چاپ می‌کند.'],
  ['چرا مهم است؟','وقتی برنامه بزرگ‌تر شود، print مثل چراغ قوه است: کمک می‌کند بفهمی داخل برنامه چه خبر است.']
 ],examples:[
  {t:'سلام ساده',code:'print("سلام ربات")',out:'سلام ربات',why:'متن داخل کوتیشن چاپ شد.'},
  {t:'چند خروجی',code:'print("مرحله 1")\nprint("مرحله 2")',out:'مرحله 1\nمرحله 2',why:'هر print در خط جداگانه خروجی می‌دهد.'},
  {t:'عدد هم چاپ می‌شود',code:'print(7)',out:'7',why:'عدد لازم نیست داخل کوتیشن باشد.'}
 ],predict:{code:'print("Python")\nprint(3)',choices:['Python 3','Python\n3','"Python"\n3'],answer:1,why:'دو دستور print داریم، پس دو خط خروجی می‌آید.'},exercises:[
  {id:'o1',title:'پیام شروع',prompt:'یک برنامه بنویس که دقیقاً متن زیر را چاپ کند:',target:'شروع مأموریت',checks:[{type:'exact',value:'شروع مأموریت'}],hint:['از print استفاده کن.','متن باید داخل کوتیشن باشد.']},
  {id:'o2',title:'دو خط انرژی',prompt:'دو خط چاپ کن: خط اول «تمرکز» و خط دوم «کد».',target:'تمرکز\nکد',checks:[{type:'exact',value:'تمرکز\nکد'}],hint:['به دو دستور print نیاز داری.','هر کلمه داخل کوتیشن قرار می‌گیرد.']},
  {id:'o3',title:'عدد مخفی',prompt:'عدد 42 را چاپ کن. فقط عدد چاپ شود، نه متن اضافه.',target:'42',checks:[{type:'exact',value:'42'}],hint:['عدد را می‌توانی بدون کوتیشن چاپ کنی.','print(42) شکل کلی کار است.']},
  {id:'o4',title:'تابلوی بازی',prompt:'سه خط بساز: Python / Quest / Go',target:'Python\nQuest\nGo',checks:[{type:'exact',value:'Python\nQuest\nGo'}],hint:['سه print پشت سر هم بنویس.','به ترتیب خط‌ها دقت کن.']}
 ],project:{title:'تابلوی شروع بازی',brief:'یک صفحه شروع متنی برای بازی خیالی خودت بساز.',steps:['نام بازی را چاپ کن.','یک جمله کوتاه انگیزشی چاپ کن.','یک عدد مرحله یا امتیاز اولیه چاپ کن.']}},
 {id:'variables',emoji:'🏷️',title:'متغیرها و متن',skill:'variables',hook:'جعبه‌های حافظه بساز تا برنامه چیزها را یادش بماند.',goal:'ذخیره متن و استفاده دوباره از آن.',bits:[
  ['متغیر چیست؟','متغیر یک نام برای نگهداری مقدار است. مثل برچسب روی یک جعبه.'],
  ['علامت مساوی','در پایتون، = یعنی مقدار سمت راست را داخل نام سمت چپ ذخیره کن.'],
  ['استفاده دوباره','وقتی مقدار را در متغیر گذاشتی، هر جا نام متغیر را بنویسی، پایتون مقدارش را استفاده می‌کند.']
 ],examples:[
  {t:'نام بازیکن',code:'name = "آرمان"\nprint(name)',out:'آرمان',why:'متغیر name متن آرمان را نگه داشت.'},
  {t:'چسباندن متن',code:'pet = "اژدها"\nprint("حیوان من: " + pet)',out:'حیوان من: اژدها',why:'با + دو متن را کنار هم گذاشتیم.'},
  {t:'تغییر مقدار',code:'mood = "آماده"\nprint(mood)\nmood = "برنده"\nprint(mood)',out:'آماده\nبرنده',why:'متغیر می‌تواند مقدار جدید بگیرد.'}

function exerciseFromKey(key){const [lid,eid]=key.split(':');const l=lessons.find(x=>x.id===lid);const ex=l.exercises.find(x=>x.id===eid);return{l,ex}}

function checkExercise(ex,code,stdout){const norm=s=>String(s||'').trim().replace(/\r/g,'');for(const c of ex.checks){if(c.type==='exact'&&norm(stdout)!==norm(c.value))return{ok:false,msg:'خروجی باید دقیقاً مثل هدف باشد. فاصله و خط اضافه را هم چک کن.'};if(c.type==='containsCode'&&!code.includes(c.value))return{ok:false,msg:'کدت خروجی داده، اما یکی از بخش‌های تمرین در خود کد دیده نشد: '+c.value};}return{ok:true}}

function completeLesson(id){const idx=lessons.findIndex(l=>l.id===id);if(!state.done[id]){state.done[id]=true;state.xp+=40;touchStreak();const next=lessons[idx+1];if(next)state.currentLesson=next.id;state.stage='understand';save();showReward('مأموریت کامل شد','یک درس واقعی را با حدس، تمرین و جمع‌بندی تمام کردی. حالا درس بعدی باز شد.')}else{toast('این مأموریت قبلاً کامل شده.')}render()}
function showReward(t,msg){$('#rewardTitle').textContent=t;$('#rewardText').textContent=msg;$('#rewardModal').classList.add('show');confetti()}
function friendlyError(e){e=String(e||'');if(e.includes('SyntaxError'))return'ساختار کد مشکل دارد. معمولاً یک کوتیشن، پرانتز یا دو نقطه جا افتاده است.';if(e.includes('IndentationError'))return'تورفتگی درست نیست. کد داخل if، for یا def باید کمی جلوتر باشد.';if(e.includes('NameError'))return'یک نام را قبل از ساختن استفاده کرده‌ای، یا اسم متغیر را متفاوت نوشته‌ای.';if(e.includes('TypeError'))return'نوع داده‌ها با هم سازگار نیستند؛ مثلاً متن و عدد را مستقیم جمع کرده‌ای.';return'یک خطا رخ داد. از روی آخرین خط خطا شروع کن و فقط یک چیز را اصلاح کن.'}
function createWorker(){const src=`importScripts('https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js');let pyReady=loadPyodide();onmessage=async(e)=>{const{id,code}=e.data;try{let py=await pyReady;py.globals.set('USER_CODE',code);await py.runPythonAsync(\`import sys, io, traceback\n_out=io.StringIO(); _err=io.StringIO()\n_old_out, _old_err = sys.stdout, sys.stderr\nsys.stdout, sys.stderr = _out, _err\n_status='ok'\ntry:\n    exec(USER_CODE, {})\nexcept Exception:\n    _status='error'\n    traceback.print_exc(file=_err)\nfinally:\n    sys.stdout, sys.stderr = _old_out, _old_err\nRESULT={'status':_status,'stdout':_out.getvalue(),'stderr':_err.getvalue()}\`);let res=py.globals.get('RESULT').toJs({dict_converter:Object.fromEntries});postMessage({id,res});}catch(err){postMessage({id,res:{status:'error',stdout:'',stderr:String(err)}})}}`;return new Worker(URL.createObjectURL(new Blob([src],{type:'text/javascript'})));}
function runPython(code){return new Promise((resolve,reject)=>{if(!pyWorker)pyWorker=createWorker();const id=++runSeq;const timer=setTimeout(()=>{try{pyWorker.terminate()}catch(e){}pyWorker=null;reject(new Error('timeout'))},4500);pyWorker.onmessage=e=>{if(e.data.id!==id)return;clearTimeout(timer);resolve(e.data.res)};pyWorker.postMessage({id,code});})}
function confetti(){if(state.calm)return;const box=document.createElement('div');box.className='confetti';document.body.appendChild(box);for(let i=0;i<26;i++){const d=document.createElement('i');d.className='dot';d.style.left=Math.random()*100+'%';d.style.background=['#0a84ff','#6e5cff','#16a34a','#f59e0b'][i%4];d.style.animationDelay=(Math.random()*0.3)+'s';box.appendChild(d)}setTimeout(()=>box.remove(),1200)}
function exportProgress(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='python-quest-progress.json';a.click();URL.revokeObjectURL(a.href)}
function resetProgress(){if(confirm('همه پیشرفت پاک شود؟')){state=baseState();save();render()}}
function updateFromHash(){const h=location.hash.replace('#/','');if(['home','learn','practice','projects','review'].includes(h)){view=h;render()}}
$$('[data-view]').forEach(b=>b.onclick=()=>setView(b.dataset.view));$('#themeBtn').onclick=()=>{state.theme=state.theme==='dark'?'light':'dark';save();render()};$('#calmBtn').onclick=()=>{state.calm=!state.calm;save();render();toast(state.calm?'حالت آرام روشن شد':'حالت آرام خاموش شد')};$('#focusBtn').onclick=()=>{state.focus=!state.focus;save();render();toast(state.focus?'حالت تمرکز روشن شد':'حالت تمرکز خاموش شد')};$('#closeRescue').onclick=()=>$('#rescueModal').classList.remove('show');$('#breakBtn').onclick=()=>{$('#rescueText').textContent='۲۰ ثانیه: بلند شو، دست‌ها را باز و بسته کن، یک نفس عمیق، بعد فقط یک خط کد.'};$('#closeReward').onclick=()=>$('#rewardModal').classList.remove('show');window.addEventListener('hashchange',updateFromHash);render();
</script>
